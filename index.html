        </div>
        <div class="form-group">
          <label class="form-label">Notes</label>
          <textarea class="form-input" id="vf-body" rows="4" placeholder="What happened, observations, medications..." required></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Vet name</label>
          <input class="form-input" id="vf-vet" placeholder="Dr. Smith"/>
        </div>
      </div>
      <div class="form-footer">
        <button class="btn btn-ghost" id="form-cancel">Cancel</button>
        <button class="btn btn-primary" id="vf-save">Save visit</button>
      </div>`;

    el.querySelector('#vf-save').onclick = () => {
      const title = document.getElementById('vf-title').value.trim();
      const body  = document.getElementById('vf-body').value.trim();
      if (!title || !body) { if(!title) document.getElementById('vf-title').focus(); else document.getElementById('vf-body').focus(); return; }
      const cid = document.getElementById('vf-cat').value;
      const note = { id:uid(), date:document.getElementById('vf-date').value, title, body, vet: document.getElementById('vf-vet').value.trim() };
      if (!vet[cid]) vet[cid] = [];
      vet[cid].push(note);
      saveData(); closeDrawers(); render();
    };
  }

  else if (type==='event') {
    const catSel = `<option value="">— any cat —</option>` + CATS.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
    const kindSel = ['purchase','vet','refill','other'].map(k=>`<option value="${k}" style="text-transform:capitalize">${k.charAt(0).toUpperCase()+k.slice(1)}</option>`).join('');

    const isEdit = arg && arg !== 'new';
    const ev = isEdit ? calendar.find(e=>e.id===arg) : null;

    el.innerHTML = `
      <div class="form-header">
        <div class="form-title">${isEdit?'Edit event':'New event'}</div>
        <button class="form-close" id="form-close">✕</button>
      </div>
      <div class="form-body">
        <div class="form-group">
          <label class="form-label">Date</label>
          <input class="form-input" id="ef-date" type="date" value="${ev?.date||new Date().toISOString().split('T')[0]}"/>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Kind</label>
            <select class="form-input" id="ef-kind">${kindSel}</select>
          </div>
          <div class="form-group">
            <label class="form-label">Cat (optional)</label>
            <select class="form-input" id="ef-cat">${catSel}</select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Title</label>
          <input class="form-input form-input-lg" id="ef-title" value="${ev?.title||''}" placeholder="Event title" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Detail</label>
          <textarea class="form-input" id="ef-detail" rows="3" placeholder="Notes, amount spent ($X), etc.">${ev?.detail||''}</textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Repeat</label>
          <select class="form-input" id="ef-repeat">
            <option value="none">Never</option>
            <option value="weekly">Weekly</option>
            <option value="monthly">Monthly</option>
            <option value="yearly">Yearly</option>
          </select>
        </div>
      </div>
      <div class="form-footer">
        ${isEdit?`<button class="btn btn-warn" id="ef-delete">Delete</button>`:''}
        <button class="btn btn-ghost" id="form-cancel">Cancel</button>
        <button class="btn btn-primary" id="ef-save">${isEdit?'Save':'Add event'}</button>
      </div>`;

    if (ev) {
      document.getElementById('ef-kind').value = ev.kind||'purchase';
      if (ev.catId) document.getElementById('ef-cat').value = ev.catId;
      document.getElementById('ef-repeat').value = ev.repeat || 'none';
    }

    el.querySelector('#ef-save').onclick = () => {
      const title = document.getElementById('ef-title').value.trim();
      if (!title) { document.getElementById('ef-title').focus(); return; }
      const obj = {
        id: ev?.id||uid(),
        date: document.getElementById('ef-date').value,
        kind: document.getElementById('ef-kind').value,
        catId: document.getElementById('ef-cat').value||null,
        title,
        detail: document.getElementById('ef-detail').value.trim(),
        repeat: document.getElementById('ef-repeat').value,
      };
      if (isEdit) { const idx=calendar.findIndex(e=>e.id===arg); if(idx>=0) calendar[idx]=obj; }
      else { calendar.push(obj); }
      saveData(); closeDrawers(); render();
    };

    if (isEdit) {
      el.querySelector('#ef-delete').onclick = () => {
        if (confirm(`Delete "${ev.title}"?`)) {
          calendar = calendar.filter(e=>e.id!==arg);
          saveData(); closeDrawers(); render();
        }
      };
    }
  }

  else if (type==='medicine') {
    const isNew = arg==='new' || arg.startsWith('new_');
    const defaultCatId = arg.startsWith('new_') ? arg.split('_')[1] : CATS[0].id;
    const med = isNew
      ? { id:uid(), catId:defaultCatId, name:'', dosage:'', unit:'mg', freq:'daily', startDate:new Date().toISOString().split('T')[0], endDate:'', refillDate:'', stock:'', prescribedBy:'', note:'', active:true }
      : meds.find(m=>m.id===arg);
    if (!med) return;

    const catSel = CATS.map(c=>`<option value="${c.id}"${c.id===med.catId?' selected':''}>${c.name}</option>`).join('');
    const freqOpts = [['daily','Daily'],['twice-daily','2× Daily'],['every-other-day','Every 2 days'],['weekly','Weekly'],['as-needed','As needed']];
    const freqSeg = freqOpts.map(([f,l])=>`<button class="seg-btn${med.freq===f?' active':''}" data-freq="${f}" style="font-size:11px">${l}</button>`).join('');
    const unitSeg = ['mg','ml','tab','drop'].map(u=>`<button class="seg-btn${med.unit===u?' active':''}" data-munit="${u}">${u}</button>`).join('');

    el.innerHTML = `
      <div class="form-header">
        <div class="form-title">${isNew?'Add medicine':'Edit medicine'}</div>
        <button class="form-close" id="form-close">✕</button>
      </div>
      <div class="form-body">
        <div class="form-group">
          <label class="form-label">Cat</label>
          <select class="form-input" id="mf-cat">${catSel}</select>
        </div>
        <div class="form-group">
          <label class="form-label">Medicine name</label>
          <input class="form-input form-input-lg" id="mf-name" value="${escHtml(med.name)}" placeholder="e.g. Lysine" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Dosage</label>
          <div style="display:flex;gap:8px;align-items:center">
            <input class="form-input" id="mf-dosage" type="number" min="0" step="0.1" style="flex:1" value="${med.dosage||''}" placeholder="e.g. 250"/>
            <div class="seg">${unitSeg}</div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Frequency</label>
          <div class="seg" style="flex-wrap:wrap;gap:3px">${freqSeg}</div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Start date</label>
            <input class="form-input" id="mf-start" type="date" value="${med.startDate||''}"/>
          </div>
          <div class="form-group">
            <label class="form-label">End date (optional)</label>
            <input class="form-input" id="mf-end" type="date" value="${med.endDate||''}"/>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Next refill date</label>
            <input class="form-input" id="mf-refill" type="date" value="${med.refillDate||''}"/>
          </div>
          <div class="form-group">
            <label class="form-label">Stock (doses left)</label>
            <input class="form-input" id="mf-stock" type="number" min="0" value="${med.stock!==''&&med.stock!==undefined?med.stock:''}" placeholder="0"/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Prescribed by</label>
          <input class="form-input" id="mf-vet" value="${escHtml(med.prescribedBy||'')}" placeholder="Dr. Smith"/>
        </div>
        <div class="form-group">
          <label class="form-label">Notes / instructions</label>
          <textarea class="form-input" id="mf-note" rows="3" placeholder="Dosing instructions, observations...">${escHtml(med.note||'')}</textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <div class="seg">
            <button class="seg-btn${med.active?' active':''}" data-mactive="true">Active</button>
            <button class="seg-btn${!med.active?' active':''}" data-mactive="false">Completed</button>
          </div>
        </div>
      </div>
      <div class="form-footer">
        ${!isNew ? `<button class="btn btn-warn" id="mf-delete">Delete</button>` : ''}
        <button class="btn btn-ghost" id="form-cancel">Cancel</button>
        <button class="btn btn-primary" id="mf-save">${isNew?'Add medicine':'Save changes'}</button>
      </div>`;

    let fState = { ...med };

    el.querySelectorAll('[data-munit]').forEach(btn => btn.onclick = () => {
      fState.unit = btn.dataset.munit;
      el.querySelectorAll('[data-munit]').forEach(b=>b.classList.toggle('active', b.dataset.munit===fState.unit));
    });
    el.querySelectorAll('[data-freq]').forEach(btn => btn.onclick = () => {
      fState.freq = btn.dataset.freq;
      el.querySelectorAll('[data-freq]').forEach(b=>b.classList.toggle('active', b.dataset.freq===fState.freq));
    });
    el.querySelectorAll('[data-mactive]').forEach(btn => btn.onclick = () => {
      fState.active = btn.dataset.mactive === 'true';
      el.querySelectorAll('[data-mactive]').forEach(b=>b.classList.toggle('active', (b.dataset.mactive==='true')===fState.active));
    });

    el.querySelector('#mf-save').onclick = () => {
      const name = document.getElementById('mf-name').value.trim();
      if (!name) { document.getElementById('mf-name').focus(); return; }
      const stockVal = document.getElementById('mf-stock').value;
      const obj = { ...fState, catId: document.getElementById('mf-cat').value, name,
        dosage: document.getElementById('mf-dosage').value,
        startDate: document.getElementById('mf-start').value,
        endDate: document.getElementById('mf-end').value,
        refillDate: document.getElementById('mf-refill').value,
        stock: stockVal==='' ? '' : parseInt(stockVal),
        prescribedBy: document.getElementById('mf-vet').value.trim(),
        note: document.getElementById('mf-note').value.trim(),
      };
      if (isNew) { meds.push(obj); }
      else { const idx=meds.findIndex(m=>m.id===arg); if(idx>=0) meds[idx]=obj; }
      saveData(); closeDrawers(); render();
    };

    if (!isNew) {
      el.querySelector('#mf-delete').onclick = () => {
        if (confirm(`Delete "${med.name}"?`)) {
          meds = meds.filter(m=>m.id!==arg);
          saveData(); closeDrawers(); render();
        }
      };
    }
  }

  openDrawer('form-drawer');
  document.getElementById('form-close').onclick = closeDrawers;
  document.getElementById('form-cancel').onclick = closeDrawers;
}

// ===== DRAWER MANAGEMENT =====
function openDrawer(id) {
  document.getElementById('overlay').classList.add('open');
  document.getElementById(id).classList.add('open');
  // stagger if both could be open
  if (id==='form-drawer') document.getElementById('cat-drawer').classList.remove('open');
  if (id==='cat-drawer') document.getElementById('form-drawer').classList.remove('open');
}
function closeDrawers() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('cat-drawer').classList.remove('open');
  document.getElementById('form-drawer').classList.remove('open');
}

// ===== BIND VIEW EVENTS =====
function bindViewEvents() {
  const ci = document.getElementById('content-inner');

  // cat drawer triggers
  ci.querySelectorAll('[data-cat-drawer]').forEach(el => el.onclick = e => {
    e.stopPropagation();
    openCatDrawer(el.dataset.catDrawer);
  });

  // open form triggers
  ci.querySelectorAll('[data-open-form]').forEach(el => el.onclick = () => {
    const [type, arg] = el.dataset.openForm.split(',');
    openForm(type, arg);
  });

  // edit product
  ci.querySelectorAll('[data-edit-product]').forEach(el => el.onclick = () => openForm('product', el.dataset.editProduct));

  // edit shopping
  ci.querySelectorAll('[data-edit-shop]').forEach(el => el.onclick = e => {
    e.stopPropagation();
    openForm('shopping', el.dataset.editShop);
  });

  // edit event
  ci.querySelectorAll('[data-edit-event]').forEach(el => el.onclick = e => {
    e.stopPropagation();
    openForm('event', el.dataset.editEvent);
  });

  // toggle shopping item
  ci.querySelectorAll('[data-toggle-shop]').forEach(el => el.onclick = e => {
    e.stopPropagation();
    const id = el.dataset.toggleShop;
    const item = shopping.find(s=>s.id===id);
    if (item) { item.done = !item.done; saveData(); render(); }
  });

  // edit medicine
  ci.querySelectorAll('[data-edit-med]').forEach(el => el.onclick = e => {
    e.stopPropagation();
    openForm('medicine', el.dataset.editMed);
  });

  // pantry filters
  ci.querySelectorAll('[data-pantry-cat]').forEach(el => el.onclick = () => {
    window._pantryCatFilter = el.dataset.pantryCat;
    render();
  });
  ci.querySelectorAll('[data-pantry-for]').forEach(el => el.onclick = () => {
    window._pantryForFilter = el.dataset.pantryFor;
    render();
  });

  // export csv
  const csvBtn = document.getElementById('export-csv-btn');
  if (csvBtn) csvBtn.onclick = exportData;

  const exportBtn2 = document.getElementById('export-btn2');
  if (exportBtn2) exportBtn2.onclick = exportData;

  // cal cell click
  ci.querySelectorAll('.cal-cell[data-date]').forEach(el => el.onclick = () => {
    if (!el.dataset.date) return;
    openForm('event', 'new');
    // set the date after form opens
    setTimeout(()=>{ const d=document.getElementById('ef-date'); if(d) d.value=el.dataset.date; },50);
  });

  // quick restock
  ci.querySelectorAll('[data-restock]').forEach(el => el.onclick = e => {
    e.stopPropagation();
    quickRestock(el.dataset.restock);
  });

  // add all low-stock to shopping list
  const addAllBtn = document.getElementById('add-all-low');
  if (addAllBtn) addAllBtn.onclick = () => {
    const low = products.filter(p => (parseInt(p.stock)||0) <= 1);
    let added = 0;
    low.forEach(p => {
      const onList = shopping.some(s => !s.done && s.name === p.name);
      if (!onList) {
        shopping.push({ id:uid(), name:p.name, size:p.packSize||'', for:[...(p.cats||[])], priority:'soon', store:p.store||'', est:parseFloat(p.price)||'', done:false });
        added++;
      }
    });
    saveData();
    if (added > 0) { showToast(`${added} item${added>1?'s':''} added to shopping list`); render(); }
    else showToast('All low-stock items already on the list');
  };

  // stock +/- buttons on pantry cards
  function bindStockCtrl(root) {
    root.querySelectorAll('[data-stock-inc],[data-stock-dec]').forEach(btn => {
      btn.onclick = e => {
        e.stopPropagation();
        const id = btn.dataset.stockInc || btn.dataset.stockDec;
        const p = products.find(x => x.id === id); if (!p) return;
        const delta = btn.dataset.stockInc ? 1 : -1;
        const prev = parseInt(p.stock)||0;
        p.stock = Math.max(0, prev + delta);
        p.updatedDate = new Date().toISOString();
        saveData();
        // patch the card in-place without a full re-render
        const card = btn.closest('.product-card');
        if (card) {
          const stock = p.stock;
          const stockColor = stock === 0 ? 'var(--warn)' : stock <= 1 ? '#E07A2F' : 'var(--ink-2)';
          card.querySelector('.product-card-footer span').style.color = stockColor;
          card.querySelector('.product-card-footer span').textContent = stock === 0 ? 'Out' : `${stock} left`;
          card.querySelector('.stock-ctrl-val').textContent = stock;
        }
        if (delta < 0 && p.stock === 0) {
          const onList = shopping.some(s => !s.done && s.name === p.name);
          if (!onList) showToast(`${p.name} is out`, { label: 'Add to list', fn: () => quickRestock(p.id) });
        } else if (delta < 0 && p.stock === 1) {
          showToast(`Only 1 ${p.name} left`);
        }
      };
    });
  }
  bindStockCtrl(ci);

  // pantry search + sort
  const searchInput = document.getElementById('pantry-search');
  if (searchInput) searchInput.oninput = (e) => {
    window._pantrySearch = e.target.value;
    // targeted re-render: just the grid
    const grid = document.querySelector('.product-grid');
    if (grid) {
      const filtered = filteredPantryProducts();
      grid.innerHTML = renderPantryCards(filtered);
      grid.querySelectorAll('[data-edit-product]').forEach(el => el.onclick = () => openForm('product', el.dataset.editProduct));
      bindStockCtrl(grid);
    }
  };
  const sortSel = document.getElementById('pantry-sort');
  if (sortSel) sortSel.onchange = () => { window._pantrySort = sortSel.value; render(); };

  // settings interactions
  bindSettingsEvents(ci);
}

// ===== SETTINGS BIND =====
function bindSettingsEvents(ci) {
  if (currentView !== 'settings') return;

  // currency dropdown
  const curSel = document.getElementById('settings-currency');
  if (curSel) {
    curSel.value = currency;
    curSel.onchange = () => { currency = curSel.value; document.getElementById('currency-sel').value = currency; saveData(); render(); };
  }
  // theme toggle
  ci.querySelectorAll('[data-theme]').forEach(btn => btn.onclick = () => {
    dark = btn.dataset.theme === 'dark';
    document.documentElement.classList.toggle('dark', dark);
    document.getElementById('dark-toggle').textContent = dark ? '☀️' : '🌙';
    ci.querySelectorAll('[data-theme]').forEach(b => b.classList.toggle('active', b.dataset.theme === (dark?'dark':'light')));
    saveData();
  });

  // cat field edits (live, then Save persists)
  ci.querySelectorAll('[data-cat-field]').forEach(el => el.oninput = () => {
    const [cid, field] = el.dataset.catField.split('|');
    const c = catMap[cid]; if (!c) return;
    c[field] = el.value;
    // mirror sibling color inputs
    if (field === 'color') {
      ci.querySelectorAll(`[data-cat-field="${cid}|color"]`).forEach(sib => { if (sib !== el) sib.value = el.value; });
    }
  });

  // auto shade
  ci.querySelectorAll('[data-cat-recolor]').forEach(btn => btn.onclick = () => {
    const c = catMap[btn.dataset.catRecolor]; if (!c) return;
    const shades = deriveShades(c.color);
    c.soft = shades.soft; c.deep = shades.deep; c.tint = shades.tint;
    saveCats(); render();
  });

  // photo upload
  ci.querySelectorAll('[data-photo-pick]').forEach(btn => btn.onclick = () => {
    document.getElementById('photo-' + btn.dataset.photoPick).click();
  });
  ci.querySelectorAll('[data-cat-photo]').forEach(input => input.onchange = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const cid = input.dataset.catPhoto;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const source = ev.target.result;
      openCropper(source, cid, (croppedDataUrl) => {
        const c = catMap[cid]; if (!c) return;
        c.photo = croppedDataUrl;
        c.photoOriginal = source; // keep full-res source for future re-crop
        saveCats();
        const prev = document.querySelector(`[data-photo-preview="${cid}"]`);
        if (prev) prev.innerHTML = `<img src="${c.photo}" alt=""/>`;
        setupTopbar();
        showToast(`Photo updated for ${c.name}`);
        // re-render to surface the "Edit photo" button now that photo exists
        if (!ci.querySelector(`[data-photo-edit="${cid}"]`)) render();
      });
    };
    reader.readAsDataURL(file);
    input.value = ''; // allow re-picking same file
  });

  // edit existing photo — re-open the cropper using the saved original (or current photo as fallback)
  ci.querySelectorAll('[data-photo-edit]').forEach(btn => btn.onclick = () => {
    const cid = btn.dataset.photoEdit;
    const c = catMap[cid]; if (!c || !c.photo) return;
    const source = c.photoOriginal || c.photo;
    // if source is a /cats/{id}.jpg URL (the bundled default), fetch + convert to dataURL first
    const start = (src) => openCropper(src, cid, (croppedDataUrl) => {
      c.photo = croppedDataUrl;
      saveCats();
      const prev = document.querySelector(`[data-photo-preview="${cid}"]`);
      if (prev) prev.innerHTML = `<img src="${c.photo}" alt=""/>`;
      setupTopbar();
      showToast(`Photo updated for ${c.name}`);
    });
    if (source.startsWith('data:')) {
      start(source);
    } else {
      fetch(source).then(r => r.blob()).then(blob => {
        const reader = new FileReader();
        reader.onload = () => start(reader.result);
        reader.readAsDataURL(blob);
      }).catch(() => start(source));
    }
  });

  ci.querySelectorAll('[data-photo-clear]').forEach(btn => btn.onclick = () => {
    const c = catMap[btn.dataset.photoClear]; if (!c) return;
    c.photo = '';
    c.photoOriginal = '';
    saveCats(); setupTopbar(); render();
  });

  // save
  const saveBtn = document.getElementById('settings-save');
  if (saveBtn) saveBtn.onclick = () => {
    // refresh derived maps + persist
    CATS.forEach(c => { catMap[c.id] = c; });
    saveCats();
    setupTopbar();
    showToast('Saved');
  };

  // export
  const exp = document.getElementById('settings-export');
  if (exp) exp.onclick = exportData;

  // import
  const impBtn = document.getElementById('settings-import');
  const impFile = document.getElementById('settings-import-file');
  if (impBtn && impFile) {
    impBtn.onclick = () => impFile.click();
    impFile.onchange = (e) => {
      const file = e.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const wb = XLSX.read(ev.target.result, { type: 'array' });
          let pCount = 0, sCount = 0;
          if (wb.SheetNames.includes('Products')) {
            const rows = XLSX.utils.sheet_to_json(wb.Sheets['Products']);
            rows.forEach(r => {
              if (!r.Name) return;
              const existing = products.find(p => p.name === r.Name);
              const obj = {
                id: existing?.id || uid(),
                name: r.Name, brand: r.Brand||'', category: r.Category||'Food',
                packSize: r.PackSize||'', price: parseFloat(r.Price)||0, perUnit: r.PerUnit||'',
                store: r.Store||'', stock: parseInt(r.Stock)||0, rating: r.Rating||'',
                cats: (r.Cats||'').split(',').filter(Boolean), note: r.Note||'',
                tone: existing?.tone || CAT_TONE[r.Category] || '#D9CFB6',
                packAmount: existing?.packAmount || '', packUnit: existing?.packUnit || 'g',
                updatedDate: new Date().toISOString(),
              };
              if (existing) Object.assign(existing, obj); else products.push(obj);
              pCount++;
            });
          }
          if (wb.SheetNames.includes('Shopping')) {
            const rows = XLSX.utils.sheet_to_json(wb.Sheets['Shopping']);
            rows.forEach(r => {
              if (!r.Name) return;
              const existing = shopping.find(s => s.name === r.Name);
              const obj = {
                id: existing?.id || uid(),
                name: r.Name, size: r.Size||'', store: r.Store||'',
                est: parseFloat(r.Est)||'', priority: r.Priority||'soon',
                for: (r.For||'').split(',').filter(Boolean), done: r.Done === true || r.Done === 'true',
              };
              if (existing) Object.assign(existing, obj); else shopping.push(obj);
              sCount++;
            });
          }
          saveData(); render();
          showToast(`Imported ${pCount} products, ${sCount} shopping items`);
        } catch (err) {
          alert('Import failed: ' + err.message);
        }
        impFile.value = '';
      };
      reader.readAsArrayBuffer(file);
    };
  }

  // reset all
  const resetBtn = document.getElementById('settings-reset');
  if (resetBtn) resetBtn.onclick = () => {
    if (confirm('Wipe ALL data (products, shopping, calendar, vet notes, meds, cat profile edits)? This cannot be undone.')) {
      localStorage.clear();
      location.reload();
    }
  };
}

// ===== EXPORT =====
function exportData() {
  if (typeof XLSX === 'undefined') { alert('SheetJS not loaded.'); return; }
  const wb = XLSX.utils.book_new();
  const prodData = products.map(p=>({
    Name:p.name, Brand:p.brand, Category:p.category, PackSize:p.packSize,
    Price:p.price, PerUnit:p.perUnit, Store:p.store, Stock:p.stock,
    Rating:p.rating, Cats:(p.cats||[]).join(','), Note:p.note,
  }));
  const shopData = shopping.map(s=>({ Name:s.name, Size:s.size, Store:s.store, Est:s.est, Priority:s.priority, For:(s.for||[]).join(','), Done:s.done }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(prodData), 'Products');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(shopData), 'Shopping');
  XLSX.writeFile(wb, 'pantry-export.xlsx');
}

// ===== HTML ESCAPE =====
function escHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== TOPBAR SETUP =====
function setupTopbar() {
  const sel = document.getElementById('currency-sel');
  sel.value = currency;
  sel.onchange = () => { currency = sel.value; saveData(); render(); };
}

// ===== RAIL + MOBILE TABS =====
function setupNav() {
  document.querySelectorAll('.rail-item[data-view]').forEach(el => el.onclick = () => navigate(el.dataset.view));
  document.querySelectorAll('.mob-tab[data-view]').forEach(el => el.onclick = () => navigate(el.dataset.view));
  document.getElementById('dark-toggle').onclick = () => {
    dark = !dark;
    document.documentElement.classList.toggle('dark', dark);
    document.getElementById('dark-toggle').textContent = dark ? '☀️' : '🌙';
    saveData();
  };
  document.getElementById('export-btn').onclick = exportData;
}

// ===== OVERLAY CLOSE =====
document.getElementById('overlay').onclick = closeDrawers;
document.addEventListener('keydown', e => { if (e.key==='Escape') closeDrawers(); });

// ===== INIT =====
loadData();
if (dark) { document.documentElement.classList.add('dark'); document.getElementById('dark-toggle').textContent = '☀️'; }
document.getElementById('currency-sel').value = currency;
setupNav();
setupTopbar();
render();

// PWA: register service worker so the app works offline / is installable
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => { /* offline-only, fine to ignore */ });
  });
}
</script>
