<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pantry — Cat Product Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;1,400;1,500;1,600&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg:        #E9E2D0;
      --cream:     #F6F1E7;
      --cream-2:   #EFE8D9;
      --paper:     #FBF7EE;
      --ink:       #2A2521;
      --ink-2:     #4A413A;
      --mute:      #8C8276;
      --hair:      #E4DCC9;
      --hair-2:    #D6CCB4;
      --warn:      #C25A3A;
      --good:      #6E8B53;

      --c-macson:       #6B8AAE;
      --c-miumiu:       #D87A6E;
      --c-duoduo:       #D9A05A;
      --c-llaollao:     #8AA77B;
      --c-macson-tint:   #F1F5FA;
      --c-miumiu-tint:   #FAEFEC;
      --c-duoduo-tint:   #FBF3E2;
      --c-llaollao-tint: #EEF3E9;
      --c-macson-soft:   #E4ECF4;
      --c-miumiu-soft:   #F6E0DC;
      --c-duoduo-soft:   #F4E5CC;
      --c-llaollao-soft: #E1EAD9;

      --font-display: "Newsreader", Georgia, serif;
      --font-body:    "Manrope", -apple-system, sans-serif;
      --font-mono:    "JetBrains Mono", ui-monospace, monospace;

      --r-sm: 10px;
      --r-md: 16px;
      --r-lg: 22px;
      --r-xl: 32px;
      --shadow-card: 0 1px 0 rgba(42,37,33,0.04), 0 8px 22px -12px rgba(42,37,33,0.18);
      --shadow-soft: 0 1px 0 rgba(42,37,33,0.04), 0 2px 8px -4px rgba(42,37,33,0.08);
    }

    html.dark {
      --bg:     #1C1C1E;
      --cream:  #2C2C2E;
      --cream-2:#3A3A3C;
      --paper:  #242424;
      --ink:    #F0F0F0;
      --ink-2:  #AEAEB2;
      --mute:   #6C6C70;
      --hair:   #3A3A3C;
      --hair-2: #48484A;
    }

    html.dark input, html.dark select, html.dark textarea {
      background: var(--cream-2);
      color: var(--ink);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--ink);
      display: flex;
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ===== LEFT RAIL ===== */
    .rail {
      width: 86px;
      background: var(--paper);
      border-right: 1px solid var(--hair);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 0;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
      gap: 0;
    }

    .rail-logo {
      width: 44px; height: 44px;
      background: var(--ink);
      border-radius: var(--r-md);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 28px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .rail-logo span {
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 500;
      font-size: 22px;
      color: var(--cream);
    }

    .rail-nav {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex: 1;
      width: 100%;
    }

    .rail-item {
      width: 60px; height: 52px;
      border-radius: var(--r-md);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--mute);
      font-family: var(--font-body);
      font-size: 10px;
      font-weight: 500;
      transition: background 0.15s, color 0.15s;
    }
    .rail-item .icon { font-size: 18px; line-height: 1; }
    .rail-item:hover { background: var(--cream); color: var(--ink); }
    .rail-item.active { background: var(--cream-2); color: var(--ink); }

    .rail-bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .dark-toggle {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 1px solid var(--hair);
      background: var(--cream);
      color: var(--ink-2);
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .dark-toggle:hover { background: var(--cream-2); }

    .export-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 1px solid var(--hair);
      background: var(--cream);
      color: var(--ink-2);
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
      title: "Export to Excel";
    }
    .export-btn:hover { background: var(--cream-2); }

    /* ===== MAIN ===== */
    .main {
      margin-left: 86px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ===== TOP BAR ===== */
    .topbar {
      height: 56px;
      background: var(--paper);
      border-bottom: 1px solid var(--hair);
      display: flex;
      align-items: center;
      padding: 0 28px;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .topbar-brand {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 22px;
      font-weight: 500;
      color: var(--ink);
      flex: 1;
    }

    .topbar-controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .topbar select {
      height: 34px;
      padding: 0 10px;
      border: 1px solid var(--hair);
      border-radius: var(--r-sm);
      background: var(--cream);
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }

    /* ===== CONTENT AREA ===== */
    .content {
      padding: 28px;
      max-width: 1000px;
    }

    /* ===== GREETING ===== */
    .greeting {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .greeting-title {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 44px;
      font-weight: 500;
      color: var(--ink);
      line-height: 1;
    }

    .greeting-date {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--mute);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* ===== CAT TILES ===== */
    .cat-tiles {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 22px;
    }

    .cat-tile {
      border-radius: var(--r-lg);
      padding: 16px;
      cursor: pointer;
      transition: box-shadow 0.15s, transform 0.12s;
      border: 2px solid transparent;
      user-select: none;
    }
    .cat-tile:hover { transform: translateY(-2px); }
    .cat-tile.active { box-shadow: 0 0 0 2px var(--ink) inset; }

    .cat-tile-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .cat-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display);
      font-weight: 600;
      font-style: italic;
      font-size: 16px;
      color: white;
      flex-shrink: 0;
    }

    .cat-count {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--mute);
      background: rgba(0,0,0,0.06);
      padding: 2px 8px;
      border-radius: 20px;
    }

    .cat-tile-name {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 22px;
      font-weight: 500;
      color: var(--ink);
      display: block;
    }

    .cat-tile-sub {
      font-size: 11.5px;
      color: var(--mute);
      margin-top: 2px;
    }

    /* ===== FILTER PILLS ===== */
    .filter-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .filter-pill {
      height: 32px;
      padding: 0 14px;
      border-radius: 20px;
      border: 1px solid var(--hair);
      background: var(--paper);
      color: var(--ink-2);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
      white-space: nowrap;
    }
    .filter-pill:hover { border-color: var(--hair-2); background: var(--cream); }
    .filter-pill.active {
      background: var(--ink);
      color: var(--cream);
      border-color: var(--ink);
    }

    .filter-pill .pill-count {
      font-family: var(--font-mono);
      font-size: 11px;
      opacity: 0.65;
    }

    /* ===== PRODUCT LIST ===== */
    .product-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .product-card {
      background: var(--paper);
      border: 1px solid var(--hair);
      border-radius: var(--r-md);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: transform 0.12s, border-color 0.12s, box-shadow 0.12s;
      box-shadow: var(--shadow-soft);
    }
    .product-card:hover {
      transform: translateY(-1px);
      border-color: var(--hair-2);
      box-shadow: var(--shadow-card);
    }

    .cat-icon {
      width: 56px; height: 56px;
      border-radius: var(--r-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      font-weight: 700;
      font-family: var(--font-mono);
      color: white;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    .cat-icon::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(
        45deg,
        rgba(255,255,255,0.08) 0px,
        rgba(255,255,255,0.08) 2px,
        transparent 2px,
        transparent 8px
      );
    }
    .cat-icon span { position: relative; z-index: 1; }

    .product-info { flex: 1; min-width: 0; }
    .product-name {
      font-weight: 600;
      font-size: 14.5px;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .product-meta {
      font-size: 12px;
      color: var(--mute);
      margin-top: 2px;
    }

    .stock-pill {
      font-family: var(--font-mono);
      font-size: 11.5px;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--cream-2);
      color: var(--ink-2);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .stock-pill.low {
      background: #F7D9CE;
      color: var(--warn);
    }

    .price-unit {
      font-family: var(--font-mono);
      font-size: 12.5px;
      color: var(--ink-2);
      white-space: nowrap;
      flex-shrink: 0;
      min-width: 100px;
      text-align: right;
    }

    .cat-chips {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .cat-chip {
      width: 22px; height: 22px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: white;
      font-family: var(--font-mono);
    }

    .product-rating {
      font-size: 16px;
      flex-shrink: 0;
    }

    /* ===== ADD STUB ===== */
    .add-stub {
      margin-top: 10px;
      border: 2px dashed var(--hair-2);
      border-radius: var(--r-md);
      padding: 18px;
      text-align: center;
      color: var(--mute);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .add-stub:hover {
      border-color: var(--ink);
      color: var(--ink);
      background: var(--cream);
    }

    /* ===== SHOPPING VIEW ===== */
    .shopping-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .shopping-title {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 36px;
      color: var(--ink);
    }
    .shopping-sub {
      font-size: 13px;
      color: var(--mute);
      margin-top: 4px;
    }

    .shopping-card {
      background: var(--paper);
      border: 1px solid var(--hair);
      border-radius: var(--r-md);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: var(--shadow-soft);
    }

    .check-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 2px solid var(--hair-2);
      background: transparent;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      color: var(--mute);
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .check-btn.checked {
      background: var(--good);
      border-color: var(--good);
      color: white;
    }

    /* ===== DRAWER ===== */
    .backdrop {
      position: fixed;
      inset: 0;
      background: rgba(42,37,33,0.35);
      backdrop-filter: blur(3px);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .backdrop.visible {
      opacity: 1;
      pointer-events: all;
    }

    .drawer {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 520px;
      background: var(--paper);
      z-index: 201;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.28s cubic-bezier(0.32, 0.72, 0, 1);
      box-shadow: -8px 0 40px rgba(42,37,33,0.15);
    }
    .drawer.open {
      transform: translateX(0);
    }

    .drawer-hero {
      height: 110px;
      position: relative;
      flex-shrink: 0;
      display: flex;
      align-items: flex-end;
      padding: 16px 20px;
    }

    .drawer-close {
      position: absolute;
      top: 14px; right: 14px;
      width: 32px; height: 32px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.25);
      color: white;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
      transition: background 0.15s;
    }
    .drawer-close:hover { background: rgba(255,255,255,0.4); }

    .drawer-hero-label {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.75);
    }

    .drawer-body {
      flex: 1;
      overflow-y: auto;
      padding: 22px 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    label {
      font-size: 12px;
      font-weight: 600;
      color: var(--mute);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    input[type="text"],
    input[type="number"],
    input[type="date"],
    textarea,
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--hair);
      border-radius: var(--r-sm);
      background: var(--cream);
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--ink-2);
    }

    .input-name {
      font-size: 18px;
      font-weight: 600;
      padding: 12px 14px;
    }

    textarea {
      resize: vertical;
      min-height: 72px;
    }

    /* Segmented */
    .seg {
      display: flex;
      background: var(--cream-2);
      border-radius: var(--r-sm);
      padding: 3px;
      gap: 3px;
    }
    .seg-btn {
      flex: 1;
      padding: 7px 10px;
      border: none;
      border-radius: 7px;
      background: transparent;
      color: var(--mute);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      text-align: center;
    }
    .seg-btn.active {
      background: var(--paper);
      color: var(--ink);
      box-shadow: var(--shadow-soft);
    }

    /* Price result */
    .price-result {
      background: var(--cream-2);
      border-radius: var(--r-md);
      padding: 16px 20px;
      text-align: center;
    }
    .price-result-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--mute);
      margin-bottom: 6px;
    }
    .price-result-value {
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: 500;
      color: var(--ink);
      line-height: 1;
    }

    /* Cat preference */
    .cat-pref-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .cat-pref-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--hair);
      background: var(--cream);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--ink-2);
    }
    .cat-pref-btn.active {
      border-color: currentColor;
      font-weight: 600;
    }

    /* Rating */
    .rating-row {
      display: flex;
      gap: 8px;
    }
    .rating-btn {
      flex: 1;
      padding: 8px;
      border: 1.5px solid var(--hair);
      border-radius: var(--r-sm);
      background: var(--cream);
      font-size: 20px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }
    .rating-btn.active {
      border-color: var(--ink-2);
      background: var(--cream-2);
    }

    /* Drawer footer */
    .drawer-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--hair);
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }

    .btn-primary {
      flex: 1;
      height: 44px;
      border-radius: var(--r-md);
      border: none;
      background: var(--ink);
      color: var(--cream);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.85; }

    .btn-ghost {
      height: 44px;
      padding: 0 18px;
      border-radius: var(--r-md);
      border: 1.5px solid var(--hair-2);
      background: transparent;
      color: var(--warn);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-ghost:hover { background: #F7D9CE; border-color: var(--warn); }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--mute);
    }
    .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state-text { font-size: 15px; font-weight: 500; }
    .empty-state-sub { font-size: 13px; margin-top: 6px; opacity: 0.7; }

    /* ===== MOBILE ===== */
    @media (max-width: 700px) {
      .rail { display: none; }
      .main { margin-left: 0; padding-bottom: 70px; }
      .content { padding: 16px; }
      .cat-tiles { grid-template-columns: repeat(2, 1fr); }
      .drawer { width: 100%; }
      .form-row { grid-template-columns: 1fr; }
      .bottom-tabs {
        display: flex !important;
        position: fixed;
        bottom: 0; left: 0; right: 0;
        height: 64px;
        background: var(--paper);
        border-top: 1px solid var(--hair);
        z-index: 100;
        padding: 0 8px;
        align-items: center;
        justify-content: space-around;
      }
      .greeting-title { font-size: 32px; }
    }

    .bottom-tabs { display: none; }

    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 8px 16px;
      border-radius: var(--r-md);
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--mute);
      font-family: var(--font-body);
      font-size: 10px;
      font-weight: 500;
      transition: color 0.15s;
    }
    .tab-item .icon { font-size: 20px; }
    .tab-item.active { color: var(--ink); }
    .tab-item.add {
      background: var(--ink);
      color: var(--cream);
      border-radius: 50%;
      width: 48px; height: 48px;
      font-size: 22px;
      padding: 0;
      flex-direction: row;
      justify-content: center;
    }
  </style>
</head>
<body>

<!-- Left Rail -->
<nav class="rail" id="rail">
  <div class="rail-logo"><span>p</span></div>
  <div class="rail-nav">
    <button class="rail-item active" id="nav-pantry" onclick="switchView('pantry')">
      <span class="icon">🗃</span>
      <span>Pantry</span>
    </button>
    <button class="rail-item" id="nav-shopping" onclick="switchView('shopping')">
      <span class="icon">🛒</span>
      <span>Shopping</span>
    </button>
  </div>
  <div class="rail-bottom">
    <button class="export-btn" onclick="exportExcel()" title="Export to Excel">📊</button>
    <button class="dark-toggle" id="dark-toggle" onclick="toggleDark()">🌙</button>
  </div>
</nav>

<!-- Main -->
<main class="main">
  <!-- Top Bar -->
  <div class="topbar">
    <span class="topbar-brand">pantry</span>
    <div class="topbar-controls">
      <select id="currency-select" onchange="setCurrency(this.value)">
        <option value="HK$">HK$</option>
        <option value="USD$">USD$</option>
        <option value="¥">¥</option>
        <option value="€">€</option>
        <option value="£">£</option>
        <option value="SGD$">SGD$</option>
      </select>
    </div>
  </div>

  <!-- Content -->
  <div class="content" id="main-content"></div>
</main>

<!-- Mobile Bottom Tabs -->
<div class="bottom-tabs">
  <button class="tab-item active" id="tab-pantry" onclick="switchView('pantry')">
    <span class="icon">🗃</span>
    <span>Pantry</span>
  </button>
  <button class="tab-item add" onclick="openDrawer(null)">+</button>
  <button class="tab-item" id="tab-shopping" onclick="switchView('shopping')">
    <span class="icon">🛒</span>
    <span>Shopping</span>
  </button>
</div>

<!-- Drawer Backdrop -->
<div class="backdrop" id="backdrop" onclick="closeDrawer()"></div>

<!-- Drawer -->
<div class="drawer" id="drawer">
  <div class="drawer-hero" id="drawer-hero">
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
    <span class="drawer-hero-label" id="drawer-hero-label">New Product</span>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
  <div class="drawer-footer">
    <button class="btn-primary" onclick="saveProduct()">Save</button>
    <button class="btn-ghost" id="delete-btn" onclick="deleteProduct()" style="display:none">Delete</button>
  </div>
</div>

<script>
// ===== STATE =====
const CATS = [
  { name: 'Macson',  color: '#6B8AAE', tint: 'var(--c-macson-tint)',  soft: 'var(--c-macson-soft)',  initial: 'M' },
  { name: 'Miumiu',  color: '#D87A6E', tint: 'var(--c-miumiu-tint)',  soft: 'var(--c-miumiu-soft)',  initial: 'M' },
  { name: 'Duoduo',  color: '#D9A05A', tint: 'var(--c-duoduo-tint)',  soft: 'var(--c-duoduo-soft)',  initial: 'D' },
  { name: 'Llaollao',color: '#8AA77B', tint: 'var(--c-llaollao-tint)',soft: 'var(--c-llaollao-soft)',initial: 'L' },
];

const CATEGORIES = [
  { name: 'Food',        icon: '🍖', color: '#C25A3A' },
  { name: 'Litter',      icon: '🪨', color: '#8C7355' },
  { name: 'Treats',      icon: '🎁', color: '#D9A05A' },
  { name: 'Supplements', icon: '💊', color: '#6B8AAE' },
];

let products = [];
let nextId = 1;
let currency = 'HK$';
let dark = false;
let filterCat = 'All';
let filterPet = 'All';
let activeView = 'pantry';
let drawerOpen = false;
let editingId = null;
let checkedIds = new Set();

// ===== PERSISTENCE =====
function save() {
  localStorage.setItem('pantry_products', JSON.stringify(products));
  localStorage.setItem('pantry_nextId', String(nextId));
  localStorage.setItem('pantry_currency', currency);
  localStorage.setItem('pantry_dark', String(dark));
}

function load() {
  try {
    const p = localStorage.getItem('pantry_products');
    if (p) products = JSON.parse(p);
  } catch(e) {}
  nextId = parseInt(localStorage.getItem('pantry_nextId') || '1');
  currency = localStorage.getItem('pantry_currency') || 'HK$';
  dark = localStorage.getItem('pantry_dark') === 'true';

  if (dark) {
    document.documentElement.classList.add('dark');
    document.getElementById('dark-toggle').textContent = '☀️';
  }

  const cs = document.getElementById('currency-select');
  if (cs) cs.value = currency;
}

// ===== HELPERS =====
function getCat(name) {
  return CATS.find(c => c.name === name) || CATS[0];
}

function getCatByIdx(i) { return CATS[i]; }

function getCatColor(name) {
  const c = getCat(name);
  return c ? c.color : '#8C8276';
}

function getCategoryColor(name) {
  const c = CATEGORIES.find(x => x.name === name);
  return c ? c.color : '#8C8276';
}

function getCategoryIcon(name) {
  const c = CATEGORIES.find(x => x.name === name);
  return c ? c.icon : '📦';
}

function calcPrice(product) {
  const amt = parseFloat(product.amount);
  const pr = parseFloat(product.price);
  if (!amt || !pr) return '—';
  if (product.unit === 'g') {
    return `${currency}${(pr / amt * 100).toFixed(2)} /100g`;
  } else {
    return `${currency}${(pr / amt).toFixed(2)} /kg`;
  }
}

function calcPriceRaw(amount, price, unit) {
  const amt = parseFloat(amount);
  const pr = parseFloat(price);
  if (!amt || !pr) return '—';
  if (unit === 'g') {
    return `${currency}${(pr / amt * 100).toFixed(2)} /100g`;
  } else {
    return `${currency}${(pr / amt).toFixed(2)} /kg`;
  }
}

function formatDate(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
  } catch(e) { return iso; }
}

function todayISO() {
  return new Date().toISOString().split('T')[0];
}

function formatTodayDisplay() {
  return new Date().toLocaleDateString('en-US', {
    weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
  }).toUpperCase();
}

function filteredProducts() {
  return products.filter(p => {
    if (filterCat !== 'All' && p.category !== filterCat) return false;
    if (filterPet !== 'All' && !(p.forCats || []).includes(filterPet)) return false;
    return true;
  });
}

function catProductCount(catName) {
  return products.filter(p => (p.forCats || []).includes(catName)).length;
}

function categoryCount(cat) {
  if (cat === 'All') return filteredProducts().length;
  return products.filter(p => {
    if (p.category !== cat) return false;
    if (filterPet !== 'All' && !(p.forCats || []).includes(filterPet)) return false;
    return true;
  }).length;
}

// ===== VIEW SWITCHING =====
function switchView(view) {
  activeView = view;

  document.getElementById('nav-pantry').classList.toggle('active', view === 'pantry');
  document.getElementById('nav-shopping').classList.toggle('active', view === 'shopping');

  const tabP = document.getElementById('tab-pantry');
  const tabS = document.getElementById('tab-shopping');
  if (tabP) tabP.classList.toggle('active', view === 'pantry');
  if (tabS) tabS.classList.toggle('active', view === 'shopping');

  render();
}

// ===== TOGGLE DARK =====
function toggleDark() {
  dark = !dark;
  document.documentElement.classList.toggle('dark', dark);
  document.getElementById('dark-toggle').textContent = dark ? '☀️' : '🌙';
  save();
}

function setCurrency(val) {
  currency = val;
  save();
  render();
}

// ===== RENDER =====
function render() {
  const el = document.getElementById('main-content');
  if (activeView === 'pantry') {
    el.innerHTML = renderPantry();
  } else {
    el.innerHTML = renderShopping();
  }
}

function renderPantry() {
  const fp = filteredProducts();
  const lowCount = products.filter(p => p.stock !== '' && p.stock !== null && p.stock !== undefined && parseFloat(p.stock) <= 1).length;

  let html = `
    <div class="greeting">
      <div class="greeting-title">pantry</div>
      <div class="greeting-date">${formatTodayDisplay()}</div>
    </div>

    <div class="cat-tiles">
      ${CATS.map(cat => `
        <div class="cat-tile ${filterPet === cat.name ? 'active' : ''}"
             style="background: ${cat.tint};"
             onclick="togglePetFilter('${cat.name}')">
          <div class="cat-tile-top">
            <div class="cat-avatar" style="background: ${cat.color}">${cat.initial}</div>
            <span class="cat-count">${catProductCount(cat.name)}</span>
          </div>
          <span class="cat-tile-name">${cat.name}</span>
          <div class="cat-tile-sub">${catProductCount(cat.name)} product${catProductCount(cat.name) !== 1 ? 's' : ''}</div>
        </div>
      `).join('')}
    </div>

    <div class="filter-row">
      ${['All', ...CATEGORIES.map(c => c.name)].map(cat => `
        <button class="filter-pill ${filterCat === cat ? 'active' : ''}"
                onclick="setFilterCat('${cat}')">
          ${cat !== 'All' ? getCategoryIcon(cat) + ' ' : ''}${cat}
          <span class="pill-count">${categoryCount(cat === 'All' ? 'All' : cat)}</span>
        </button>
      `).join('')}
    </div>

    <div class="product-list" id="product-list">
  `;

  if (fp.length === 0) {
    html += `
      <div class="empty-state">
        <div class="empty-state-icon">🐱</div>
        <div class="empty-state-text">No products yet</div>
        <div class="empty-state-sub">Click "+ Add product" below to get started</div>
      </div>
    `;
  } else {
    fp.forEach(p => {
      const stockNum = p.stock !== '' && p.stock !== null && p.stock !== undefined ? parseFloat(p.stock) : null;
      const isLow = stockNum !== null && stockNum <= 1;
      const stockLabel = stockNum !== null ? `${stockNum} left` : 'No stock info';
      const priceLabel = calcPrice(p);
      const metaParts = [];
      if (p.amount) metaParts.push(`${p.amount}${p.unit}`);
      if (p.store) metaParts.push(p.store);
      if (p.date) metaParts.push(formatDate(p.date));
      const catColor = getCategoryColor(p.category);

      html += `
        <div class="product-card" onclick="openDrawer(${p.id})">
          <div class="cat-icon" style="background: ${catColor}">
            <span>${getCategoryIcon(p.category)}</span>
          </div>
          <div class="product-info">
            <div class="product-name">${escHtml(p.name || 'Unnamed')}</div>
            <div class="product-meta">${metaParts.map(escHtml).join(' · ')}</div>
          </div>
          <span class="stock-pill ${isLow ? 'low' : ''}">${stockLabel}</span>
          <span class="price-unit">${priceLabel}</span>
          <div class="cat-chips">
            ${(p.forCats || []).map(cn => {
              const c = getCat(cn);
              return `<div class="cat-chip" style="background:${c.color}" title="${escHtml(cn)}">${c.initial}</div>`;
            }).join('')}
          </div>
          <span class="product-rating">${p.rating === '😻' ? '😻' : p.rating === '😐' ? '😐' : p.rating === '😾' ? '😾' : ''}</span>
        </div>
      `;
    });
  }

  html += `
    </div>
    <div class="add-stub" onclick="openDrawer(null)">+ Add product</div>
  `;

  return html;
}

function renderShopping() {
  const lowStock = products
    .filter(p => p.stock !== '' && p.stock !== null && p.stock !== undefined && parseFloat(p.stock) <= 1)
    .sort((a, b) => parseFloat(a.stock) - parseFloat(b.stock));

  let html = `
    <div class="shopping-header">
      <div>
        <div class="shopping-title">shopping</div>
        <div class="shopping-sub">${lowStock.length} item${lowStock.length !== 1 ? 's' : ''} running low</div>
      </div>
    </div>
    <div class="product-list">
  `;

  if (lowStock.length === 0) {
    html += `
      <div class="empty-state">
        <div class="empty-state-icon">✅</div>
        <div class="empty-state-text">All stocked up!</div>
        <div class="empty-state-sub">No items running low right now</div>
      </div>
    `;
  } else {
    lowStock.forEach(p => {
      const isChecked = checkedIds.has(p.id);
      const catColor = getCategoryColor(p.category);
      const priceLabel = calcPrice(p);

      html += `
        <div class="shopping-card">
          <button class="check-btn ${isChecked ? 'checked' : ''}"
                  onclick="toggleCheck(${p.id}, event)">
            ${isChecked ? '✓' : ''}
          </button>
          <div class="cat-icon" style="background: ${catColor}; opacity: ${isChecked ? '0.4' : '1'}">
            <span>${getCategoryIcon(p.category)}</span>
          </div>
          <div class="product-info" style="opacity: ${isChecked ? '0.4' : '1'}">
            <div class="product-name">${escHtml(p.name || 'Unnamed')}</div>
            <div class="product-meta">${escHtml(p.store || '')}${p.store && p.amount ? ' · ' : ''}${p.amount ? p.amount + p.unit : ''}</div>
          </div>
          <span class="stock-pill low" style="opacity: ${isChecked ? '0.4' : '1'}">${p.stock} left</span>
          <span class="price-unit" style="opacity: ${isChecked ? '0.4' : '1'}">${priceLabel}</span>
        </div>
      `;
    });
  }

  html += `</div>`;
  return html;
}

function toggleCheck(id, e) {
  e.stopPropagation();
  if (checkedIds.has(id)) checkedIds.delete(id);
  else checkedIds.add(id);
  render();
}

// ===== FILTER =====
function setFilterCat(cat) {
  filterCat = cat;
  render();
}

function togglePetFilter(petName) {
  filterPet = filterPet === petName ? 'All' : petName;
  render();
}

// ===== DRAWER =====
function openDrawer(id) {
  editingId = id;
  drawerOpen = true;

  const hero = document.getElementById('drawer-hero');
  const label = document.getElementById('drawer-hero-label');
  const deleteBtn = document.getElementById('delete-btn');

  // Determine hero color
  let heroColor = '#4A413A';
  if (id !== null) {
    const p = products.find(x => x.id === id);
    if (p) {
      heroColor = getCategoryColor(p.category);
      label.textContent = p.category || 'Product';
    }
  } else {
    label.textContent = 'New Product';
    heroColor = '#4A413A';
  }
  hero.style.background = `linear-gradient(135deg, ${heroColor}dd, ${heroColor}99)`;

  deleteBtn.style.display = id !== null ? 'block' : 'none';

  renderDrawerForm(id);

  document.getElementById('backdrop').classList.add('visible');
  document.getElementById('drawer').classList.add('open');
}

function closeDrawer() {
  drawerOpen = false;
  editingId = null;
  document.getElementById('backdrop').classList.remove('visible');
  document.getElementById('drawer').classList.remove('open');
}

function renderDrawerForm(id) {
  const p = id !== null ? products.find(x => x.id === id) : null;
  const def = p || {
    name: '', category: 'Food', unit: 'g', amount: '', price: '',
    date: todayISO(), store: '', stock: '', rating: '', forCats: [], notes: ''
  };

  const body = document.getElementById('drawer-body');

  body.innerHTML = `
    <div class="form-group">
      <label>Product Name</label>
      <input class="input-name" type="text" id="f-name" value="${escAttr(def.name)}" placeholder="e.g. Wellness CORE Chicken" autocomplete="off" />
    </div>

    <div class="form-group">
      <label>Category</label>
      <div class="seg" id="seg-cat">
        ${CATEGORIES.map(c => `
          <button class="seg-btn ${def.category === c.name ? 'active' : ''}"
                  onclick="setDrawerCat('${c.name}')">${c.icon} ${c.name}</button>
        `).join('')}
      </div>
    </div>

    <div class="form-group">
      <label>Unit</label>
      <div class="seg" id="seg-unit">
        <button class="seg-btn ${def.unit === 'g' ? 'active' : ''}" onclick="setDrawerUnit('g')">g</button>
        <button class="seg-btn ${def.unit === 'kg' ? 'active' : ''}" onclick="setDrawerUnit('kg')">kg</button>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Pack Size</label>
        <input type="number" id="f-amount" value="${escAttr(String(def.amount))}" placeholder="e.g. 85" min="0" step="any" oninput="updatePriceCalc()" />
      </div>
      <div class="form-group">
        <label>Total Price</label>
        <input type="number" id="f-price" value="${escAttr(String(def.price))}" placeholder="e.g. 15.80" min="0" step="any" oninput="updatePriceCalc()" />
      </div>
    </div>

    <div class="price-result" id="price-result">
      <div class="price-result-label">Price per unit</div>
      <div class="price-result-value" id="price-result-value">${calcPriceRaw(def.amount, def.price, def.unit)}</div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Date Bought</label>
        <input type="date" id="f-date" value="${escAttr(def.date || '')}" />
      </div>
      <div class="form-group">
        <label>Store</label>
        <input type="text" id="f-store" value="${escAttr(def.store || '')}" placeholder="e.g. PetCity" autocomplete="off" />
      </div>
    </div>

    <div class="form-group">
      <label>Stock Count</label>
      <input type="number" id="f-stock" value="${def.stock !== null && def.stock !== undefined && def.stock !== '' ? escAttr(String(def.stock)) : ''}" placeholder="e.g. 3" min="0" step="1" />
    </div>

    <div class="form-group">
      <label>Rating</label>
      <div class="rating-row">
        <button class="rating-btn ${def.rating === '😻' ? 'active' : ''}" onclick="setRating('😻')">😻</button>
        <button class="rating-btn ${def.rating === '😐' ? 'active' : ''}" onclick="setRating('😐')">😐</button>
        <button class="rating-btn ${def.rating === '😾' ? 'active' : ''}" onclick="setRating('😾')">😾</button>
        <button class="rating-btn ${def.rating === '' ? 'active' : ''}" onclick="setRating('')">—</button>
      </div>
    </div>

    <div class="form-group">
      <label>For Cats</label>
      <div class="cat-pref-row">
        ${CATS.map(cat => {
          const isActive = (def.forCats || []).includes(cat.name);
          return `
            <button class="cat-pref-btn ${isActive ? 'active' : ''}"
                    style="${isActive ? `color: ${cat.color}; border-color: ${cat.color}; background: ${cat.color}18;` : ''}"
                    onclick="toggleForCat('${cat.name}')">
              ${cat.name}
            </button>
          `;
        }).join('')}
      </div>
    </div>

    <div class="form-group">
      <label>Notes</label>
      <textarea id="f-notes" placeholder="Any notes about this product...">${escHtml(def.notes || '')}</textarea>
    </div>
  `;
}

// ===== DRAWER FIELD UPDATERS (no full re-render) =====
function setDrawerCat(cat) {
  document.querySelectorAll('#seg-cat .seg-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim().includes(cat));
  });
  // Update hero color
  const hero = document.getElementById('drawer-hero');
  const heroColor = getCategoryColor(cat);
  hero.style.background = `linear-gradient(135deg, ${heroColor}dd, ${heroColor}99)`;
  document.getElementById('drawer-hero-label').textContent = cat;
}

function setDrawerUnit(unit) {
  document.querySelectorAll('#seg-unit .seg-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim() === unit);
  });
  updatePriceCalc();
}

function updatePriceCalc() {
  const amount = document.getElementById('f-amount')?.value || '';
  const price = document.getElementById('f-price')?.value || '';
  const activeUnit = document.querySelector('#seg-unit .seg-btn.active')?.textContent.trim() || 'g';
  const resultEl = document.getElementById('price-result-value');
  if (resultEl) {
    resultEl.textContent = calcPriceRaw(amount, price, activeUnit);
  }
}

function setRating(r) {
  document.querySelectorAll('.rating-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim() === (r || '—'));
  });
}

function toggleForCat(catName) {
  const btn = [...document.querySelectorAll('.cat-pref-btn')].find(b => b.textContent.trim() === catName);
  if (!btn) return;
  const isActive = btn.classList.contains('active');
  const cat = getCat(catName);
  if (isActive) {
    btn.classList.remove('active');
    btn.style.color = '';
    btn.style.borderColor = '';
    btn.style.background = '';
  } else {
    btn.classList.add('active');
    btn.style.color = cat.color;
    btn.style.borderColor = cat.color;
    btn.style.background = cat.color + '18';
  }
}

// ===== SAVE / DELETE =====
function saveProduct() {
  const name = document.getElementById('f-name')?.value?.trim() || '';
  if (!name) {
    document.getElementById('f-name')?.focus();
    return;
  }

  const catActive = document.querySelector('#seg-cat .seg-btn.active');
  const category = catActive ? catActive.textContent.trim().replace(/^[^\w]*/, '').trim() : 'Food';
  // Extract text only (strip emoji)
  const categoryClean = CATEGORIES.find(c => catActive?.textContent.includes(c.name))?.name || 'Food';

  const unitActive = document.querySelector('#seg-unit .seg-btn.active');
  const unit = unitActive?.textContent.trim() || 'g';

  const amount = document.getElementById('f-amount')?.value || '';
  const price = document.getElementById('f-price')?.value || '';
  const date = document.getElementById('f-date')?.value || '';
  const store = document.getElementById('f-store')?.value?.trim() || '';
  const stockVal = document.getElementById('f-stock')?.value;
  const stock = stockVal !== '' && stockVal !== undefined ? parseFloat(stockVal) : '';
  const notes = document.getElementById('f-notes')?.value?.trim() || '';

  const ratingActive = document.querySelector('.rating-btn.active');
  const ratingText = ratingActive?.textContent.trim() || '';
  const rating = ratingText === '—' ? '' : ratingText;

  const forCats = [...document.querySelectorAll('.cat-pref-btn.active')].map(b => b.textContent.trim());

  if (editingId !== null) {
    const idx = products.findIndex(p => p.id === editingId);
    if (idx !== -1) {
      products[idx] = { ...products[idx], name, category: categoryClean, unit, amount, price, date, store, stock, notes, rating, forCats };
    }
  } else {
    products.push({ id: nextId++, name, category: categoryClean, unit, amount, price, date, store, stock, notes, rating, forCats });
  }

  save();
  closeDrawer();
  render();
}

function deleteProduct() {
  if (editingId === null) return;
  if (!confirm('Delete this product?')) return;
  products = products.filter(p => p.id !== editingId);
  save();
  closeDrawer();
  render();
}

// ===== EXPORT =====
function exportExcel() {
  if (typeof XLSX === 'undefined') {
    alert('SheetJS not loaded. Check your internet connection.');
    return;
  }

  const rows = products.map((p, i) => ({
    '#': i + 1,
    'Category': p.category || '',
    'Unit': p.unit || '',
    'Product': p.name || '',
    'Pack Size': p.amount ? `${p.amount}${p.unit}` : '',
    'Total Price': p.price ? `${currency}${p.price}` : '',
    'Price/Unit': calcPrice(p),
    'Date Bought': p.date || '',
    'Store': p.store || '',
    'Stock': p.stock !== '' && p.stock !== undefined ? p.stock : '',
    'Rating': p.rating || '',
    'For Cats': (p.forCats || []).join(', '),
    'Notes': p.notes || '',
  }));

  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Pantry');

  const date = new Date().toISOString().split('T')[0];
  XLSX.writeFile(wb, `pantry-${date}.xlsx`);
}

// ===== ESCAPE HELPERS =====
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function escAttr(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

// ===== KEYBOARD =====
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && drawerOpen) closeDrawer();
});

// ===== INIT =====
load();
render();
</script>

</html>
