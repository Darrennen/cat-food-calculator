<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#E9E2D0"/>
<link rel="manifest" href="/manifest.json"/>
<title>Pantry — Cat Product Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;1,400;1,500;1,600&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
:root {
  --bg:#E9E2D0; --cream:#F6F1E7; --cream-2:#EFE8D9; --paper:#FBF7EE;
  --ink:#2A2521; --ink-2:#4A413A; --mute:#8C8276; --hair:#E4DCC9; --hair-2:#D6CCB4;
  --warn:#C25A3A; --good:#6E8B53;
  --font-display:"Newsreader",Georgia,serif;
  --font-body:"Manrope",-apple-system,sans-serif;
  --font-mono:"JetBrains Mono",ui-monospace,monospace;
  --r-sm:10px; --r-md:16px; --r-lg:22px; --r-xl:32px;
  --shadow-card:0 1px 0 rgba(42,37,33,0.04),0 8px 22px -12px rgba(42,37,33,0.18);
  --shadow-soft:0 1px 0 rgba(42,37,33,0.04),0 2px 8px -4px rgba(42,37,33,0.08);
}
html.dark {
  --bg:#1C1C1E; --cream:#2C2C2E; --cream-2:#3A3A3C; --paper:#242424;
  --ink:#F0F0F0; --ink-2:#AEAEB2; --mute:#6C6C70; --hair:#3A3A3C; --hair-2:#48484A;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font-body);font-size:14px;background:var(--bg);color:var(--ink);transition:background 0.2s,color 0.2s}
button{font-family:var(--font-body);cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:var(--font-body);outline:none}
a{text-decoration:none;color:inherit}

/* ===== LAYOUT ===== */
#app{display:flex;height:100vh;overflow:hidden}

/* Rail */
#rail{
  width:86px;min-width:86px;background:var(--paper);
  border-right:1px solid var(--hair);display:flex;flex-direction:column;
  align-items:center;padding:16px 0 12px;gap:4px;z-index:10;
}
.rail-logo{
  width:56px;height:42px;background:var(--ink);border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-style:italic;font-size:11px;font-weight:600;
  color:var(--paper);margin-bottom:12px;flex-shrink:0;letter-spacing:-0.01em;
  white-space:nowrap;padding:0 6px;
}
.rail-item{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  width:64px;padding:8px 4px;border-radius:var(--r-sm);cursor:pointer;
  color:var(--mute);transition:all 0.15s;background:transparent;border:none;
}
.rail-item:hover{background:var(--cream);color:var(--ink-2)}
.rail-item.active{background:var(--cream-2);color:var(--ink)}
.rail-item svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.rail-item span{font-size:10px;font-weight:600;letter-spacing:0.02em;text-transform:uppercase}
.rail-bottom{margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:6px;padding-bottom:4px}
.rail-btn{
  width:36px;height:36px;border-radius:50%;background:transparent;border:1px solid var(--hair);
  display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;
  transition:all 0.15s;color:var(--mute);
}
.rail-btn:hover{background:var(--cream-2);color:var(--ink)}

/* Main */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{
  height:56px;min-height:56px;background:var(--paper);border-bottom:1px solid var(--hair);
  display:flex;align-items:center;padding:0 28px;gap:12px;position:sticky;top:0;z-index:9;
}
.topbar-logo{font-family:var(--font-display);font-style:italic;font-size:22px;color:var(--ink-2);flex:1}
.topbar-right{display:flex;align-items:center;gap:8px}
#currency-sel{
  background:var(--cream);border:1px solid var(--hair);color:var(--ink);
  padding:5px 10px;border-radius:var(--r-sm);font-size:13px;cursor:pointer;
}
.cat-pill{
  width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-style:italic;font-size:13px;font-weight:600;
  color:#fff;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;
  border:2px solid transparent;
}
.cat-pill:hover{transform:scale(1.1);box-shadow:var(--shadow-card)}

#content{flex:1;overflow-y:auto;padding:28px 32px 60px}
#content-inner{max-width:1100px;margin:0 auto}

/* ===== CARDS ===== */
.card{background:var(--paper);border-radius:var(--r-lg);border:1px solid var(--hair);padding:20px;box-shadow:var(--shadow-soft)}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-h h3{font-size:13px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;color:var(--ink-2)}

/* ===== PAGE HEADER ===== */
.page-header{margin-bottom:28px}
.page-kicker{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--mute);margin-bottom:6px;font-family:var(--font-mono)}
.page-title{font-family:var(--font-display);font-size:32px;font-weight:500;line-height:1.15;color:var(--ink);margin-bottom:8px}
.page-title em{font-style:italic}
.page-sub{font-size:13px;color:var(--mute);line-height:1.5}
.page-actions{display:flex;align-items:center;gap:8px;margin-top:16px}

/* ===== BUTTONS ===== */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--r-sm);font-size:13px;font-weight:600;transition:all 0.15s;cursor:pointer;border:none}
.btn-primary{background:var(--ink);color:var(--paper)}
.btn-primary:hover{background:var(--ink-2)}
.btn-ghost{background:transparent;border:1px solid var(--hair);color:var(--ink-2)}
.btn-ghost:hover{background:var(--cream-2)}
.btn-warn{background:transparent;border:1px solid var(--hair);color:var(--warn)}
.btn-warn:hover{background:#FDF0EC}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;font-family:var(--font-mono)}
.badge-ink{background:var(--ink);color:var(--paper)}
.badge-warn{background:#F2D0C3;color:var(--warn)}
.badge-good{background:#D8E9CC;color:#4A6E35}
.badge-mute{background:var(--cream-2);color:var(--mute)}

/* ===== CAT TILES ===== */
.cat-tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.cat-tile{
  border-radius:var(--r-lg);padding:16px;border:1px solid transparent;
  cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;
}
.cat-tile:hover{transform:translateY(-2px);box-shadow:var(--shadow-card)}
.cat-tile-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.cat-av{
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-style:italic;font-weight:600;color:#fff;flex-shrink:0;
}
.cat-av.sm{width:28px;height:28px;font-size:12px}
.cat-av.md{width:38px;height:38px;font-size:16px}
.cat-av.lg{width:52px;height:52px;font-size:22px}
.cat-av.xl{width:72px;height:72px;font-size:30px}
.cat-tile-name{font-family:var(--font-display);font-style:italic;font-size:22px;font-weight:500}
.cat-tile-sub{font-size:12px;color:var(--mute);margin-top:2px}
.cat-tile-swatches{display:flex;align-items:center;gap:4px;margin-top:10px}
.swatch{width:20px;height:20px;border-radius:6px}
.swatch-count{font-size:11px;font-family:var(--font-mono);color:var(--mute);margin-left:2px}

/* ===== DASHBOARD GRID ===== */
.dash-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-bottom:16px}
.dash-grid-2{display:grid;grid-template-columns:1.4fr 1fr;gap:16px}
.span2{grid-row:span 2}

/* ===== SHOP ITEMS ===== */
.shop-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--hair)}
.shop-item:last-child{border-bottom:none}
.shop-cb{
  width:22px;height:22px;border-radius:50%;border:2px solid var(--hair-2);
  flex-shrink:0;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;
}
.shop-cb:hover{border-color:var(--ink-2)}
.shop-cb.checked{background:var(--ink);border-color:var(--ink)}
.shop-cb.checked::after{content:'✓';color:#fff;font-size:11px;font-weight:700}
.shop-item.done .shop-name{text-decoration:line-through;color:var(--mute)}
.shop-name{font-size:13px;font-weight:600;flex:1}
.shop-meta{font-size:11px;color:var(--mute);display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:2px}
.shop-price{font-family:var(--font-mono);font-size:12px;color:var(--ink-2);margin-left:auto;white-space:nowrap}
.prio-badge{padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase}
.prio-urgent{background:#F2D0C3;color:var(--warn)}
.prio-soon{background:#F5E2BC;color:#95711E}
.prio-watch{background:var(--cream-2);color:var(--mute)}

/* cat pip */
.cat-pip{width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-family:var(--font-display);font-style:italic;font-size:8px;font-weight:700;color:#fff}

/* ===== STOCK BADGE ===== */
.stock-badge{font-size:11px;font-family:var(--font-mono);padding:2px 6px;border-radius:4px;background:var(--cream-2);color:var(--ink-2)}
.stock-badge.low{background:#F2D0C3;color:var(--warn)}

/* ===== BIG NUMBER ===== */
.bignum{font-family:var(--font-display);font-size:52px;font-weight:400;line-height:1;color:var(--ink)}
.bignum-sm{font-family:var(--font-display);font-size:34px;font-weight:400;line-height:1;color:var(--ink)}
.kpi-label{font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--mute);font-family:var(--font-mono);margin-bottom:6px}
.kpi-delta{font-size:12px;color:var(--mute);margin-top:4px}

/* ===== PRODUCT CARD ===== */
.product-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.product-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.product-card{border-radius:var(--r-md);border:1px solid var(--hair);background:var(--paper);overflow:hidden;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s}
.product-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-card)}
.ph{
  height:90px;border-radius:10px 10px 0 0;
  background:repeating-linear-gradient(135deg,rgba(0,0,0,0.06) 0 6px,transparent 6px 14px),var(--tone,#D9CFB6);
  display:flex;align-items:flex-end;padding:6px 8px;
  font-family:var(--font-mono);font-size:10px;color:rgba(42,37,33,0.5);text-transform:uppercase;
}
.product-card-body{padding:10px}
.product-card-name{font-size:13px;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.product-card-sub{font-size:11px;color:var(--mute)}
.product-card-pips{display:flex;gap:3px;margin-top:6px}
.product-card-footer{display:flex;align-items:center;justify-content:space-between;padding:6px 10px 8px;border-top:1px solid var(--hair);margin-top:4px}
.stock-ctrl{display:flex;align-items:center;gap:0}
.stock-ctrl-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--hair);background:var(--cream);color:var(--ink-2);font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.1s;line-height:1}
.stock-ctrl-btn:hover{background:var(--cream-2);color:var(--ink)}
.stock-ctrl-val{min-width:28px;text-align:center;font-size:12px;font-family:var(--font-mono);font-weight:600;color:var(--ink)}

/* ===== CALENDAR ===== */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-header-cell{font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--mute);text-align:center;padding:8px 0}
.cal-cell{min-height:72px;padding:6px;border-radius:8px;position:relative;cursor:pointer;transition:background 0.15s}
.cal-cell:hover{background:var(--cream-2)}
.cal-cell.dim{opacity:0.35}
.cal-num{font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--ink-2);width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.cal-cell.today .cal-num{background:var(--ink);color:var(--paper)}
.cal-ev{font-size:10px;font-weight:600;padding:2px 5px;border-radius:4px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ===== TIMELINE ===== */
.timeline-row{display:flex;gap:12px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--hair)}
.timeline-row:last-child{border-bottom:none}
.timeline-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.timeline-date{font-family:var(--font-mono);font-size:11px;color:var(--mute);white-space:nowrap}
.timeline-title{font-size:13px;font-weight:600}
.timeline-sub{font-size:11px;color:var(--mute)}

/* ===== BAR CHART ===== */
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:220px;padding:0 0 8px}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.bar-fill{width:100%;border-radius:6px 6px 0 0;min-height:4px;transition:height 0.3s}
.bar-label{font-family:var(--font-mono);font-size:10px;color:var(--mute);text-align:center}
.bar-val{font-family:var(--font-mono);font-size:10px;color:var(--ink-2)}

/* progress bar */
.prog-bar{height:6px;border-radius:3px;background:var(--hair);overflow:hidden;margin-top:4px}
.prog-fill{height:100%;border-radius:3px}

/* ===== SEGMENTED CONTROL ===== */
.seg{display:flex;background:var(--cream-2);border-radius:var(--r-sm);padding:3px;gap:2px}
.seg-btn{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;background:transparent;border:none;color:var(--mute);cursor:pointer;transition:all 0.15s}
.seg-btn.active{background:var(--paper);color:var(--ink);box-shadow:var(--shadow-soft)}

/* ===== FILTER ROW ===== */
.filter-row{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.filt-cat{
  padding:5px 11px;border-radius:20px;font-size:12px;font-weight:600;
  background:var(--cream-2);color:var(--mute);border:none;cursor:pointer;transition:all 0.15s;
}
.filt-cat.active{color:#fff}
.filt-label{font-size:12px;color:var(--mute);font-weight:600;margin-left:6px}

/* ===== ADD STUB ===== */
.add-stub{
  display:flex;align-items:center;gap:8px;padding:10px 12px;
  border:1.5px dashed var(--hair-2);border-radius:var(--r-sm);
  color:var(--mute);font-size:13px;font-weight:600;cursor:pointer;
  background:transparent;width:100%;transition:all 0.15s;margin-top:10px;
}
.add-stub:hover{border-color:var(--ink-2);color:var(--ink-2);background:var(--cream)}

/* ===== DRAWER ===== */
#overlay{
  position:fixed;inset:0;background:rgba(42,37,33,0.35);backdrop-filter:blur(4px);
  z-index:100;opacity:0;pointer-events:none;transition:opacity 0.25s;
}
#overlay.open{opacity:1;pointer-events:all}
.drawer{
  position:fixed;top:0;right:0;bottom:0;width:520px;max-width:100vw;
  background:var(--paper);z-index:101;
  transform:translateX(100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
  display:flex;flex-direction:column;overflow:hidden;
}
.drawer.open{transform:translateX(0)}
.drawer-close{
  position:absolute;top:16px;right:16px;z-index:10;
  width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.25);
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:16px;color:#fff;transition:background 0.15s;
}
.drawer-close:hover{background:rgba(255,255,255,0.4)}
.drawer-hero{
  height:220px;min-height:220px;padding:24px;display:flex;flex-direction:column;
  justify-content:flex-end;position:relative;
}
.vibe-tag{
  display:inline-block;background:rgba(255,255,255,0.2);color:#fff;
  padding:4px 10px;border-radius:20px;font-family:var(--font-display);font-style:italic;
  font-size:12px;margin-bottom:8px;width:fit-content;
}
.drawer-name{font-family:var(--font-display);font-style:italic;font-size:64px;font-weight:400;color:#fff;line-height:1}
.drawer-breed{font-size:14.5px;color:rgba(255,255,255,0.8);margin-top:4px}
.drawer-stats{display:flex;gap:20px;margin-top:12px}
.drawer-stat{display:flex;flex-direction:column;gap:2px}
.drawer-stat-label{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.6);font-family:var(--font-mono)}
.drawer-stat-val{font-size:14px;font-weight:600;color:#fff}
.drawer-body{flex:1;overflow-y:auto;padding:24px}
.drawer-section{margin-bottom:24px}
.drawer-section-title{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--mute);font-family:var(--font-mono);margin-bottom:12px}
.drawer-prod{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--hair)}
.drawer-prod:last-child{border-bottom:none}
.drawer-prod-thumb{width:38px;height:38px;border-radius:8px;flex-shrink:0}
.drawer-prod-name{font-size:13px;font-weight:600}
.drawer-prod-sub{font-size:11px;color:var(--mute)}

/* ===== FORM DRAWER ===== */
.form-header{padding:20px 24px;border-bottom:1px solid var(--hair);display:flex;align-items:center;justify-content:space-between}
.form-title{font-family:var(--font-display);font-size:22px;font-weight:500;font-style:italic}
.form-close{width:32px;height:32px;border-radius:50%;background:var(--cream-2);border:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--ink-2)}
.form-body{flex:1;overflow-y:auto;padding:24px}
.form-footer{padding:16px 24px;border-top:1px solid var(--hair);display:flex;gap:8px;justify-content:flex-end}
.form-group{margin-bottom:18px}
.form-label{font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--mute);font-family:var(--font-mono);margin-bottom:6px;display:block}
.form-input{
  width:100%;padding:10px 12px;border-radius:var(--r-sm);border:1.5px solid var(--hair);
  background:var(--cream);color:var(--ink);font-size:14px;transition:border-color 0.15s;
}
.form-input:focus{border-color:var(--ink-2)}
.form-input-lg{font-family:var(--font-display);font-size:22px;font-style:italic;padding:12px 14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.per-unit-display{font-family:var(--font-display);font-style:italic;font-size:28px;color:var(--ink-2);margin-top:6px}
.rating-btns{display:flex;gap:8px}
.rating-btn{padding:8px 14px;border-radius:var(--r-sm);border:1.5px solid var(--hair);background:var(--cream);font-size:18px;cursor:pointer;transition:all 0.15s}
.rating-btn.active{border-color:var(--ink);background:var(--ink-2);box-shadow:var(--shadow-soft)}
.cat-toggle-row{display:flex;gap:8px;flex-wrap:wrap}
.cat-toggle{
  display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;
  border:1.5px solid var(--hair);background:var(--cream);cursor:pointer;font-size:12px;font-weight:600;
  transition:all 0.15s;
}
.cat-toggle.active{color:#fff}

/* ===== VET CARD ===== */
.vet-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.vet-card{border-radius:var(--r-lg);border:1px solid var(--hair);background:var(--paper);padding:20px;box-shadow:var(--shadow-soft)}
.vet-card-head{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--hair)}
.vet-note{padding:10px 0;border-bottom:1px solid var(--hair)}
.vet-note:last-of-type{border-bottom:none}
.vet-note-date{font-family:var(--font-mono);font-size:10px;color:var(--mute);margin-bottom:3px}
.vet-note-title{font-size:13px;font-weight:700;margin-bottom:3px}
.vet-note-body{font-size:13px;color:var(--ink-2);line-height:1.5}
.vet-note-vet{font-size:11px;color:var(--mute);margin-top:4px}
.notes-count{font-size:11px;color:var(--mute);font-family:var(--font-mono)}

/* ===== RUNNING LOW ROW ===== */
.low-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--hair)}
.low-row:last-child{border-bottom:none}
.low-thumb{width:36px;height:36px;border-radius:8px;flex-shrink:0}
.low-name{flex:1;font-size:13px;font-weight:600}

/* ===== SPEND PAGE ===== */
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.kpi-card{background:var(--paper);border-radius:var(--r-lg);border:1px solid var(--hair);padding:20px;box-shadow:var(--shadow-soft)}
.cat-spend-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.cat-spend-tile{border-radius:var(--r-lg);padding:16px;border:1px solid var(--hair);background:var(--paper);box-shadow:var(--shadow-soft);text-align:center}
.cat-spend-amt{font-family:var(--font-display);font-size:34px;font-weight:400;line-height:1;margin-top:8px}

/* ===== STACKED BAR ===== */
.stack-bar{height:10px;border-radius:5px;display:flex;overflow:hidden;gap:1px;margin-top:8px}

/* ===== CAT LEGEND ===== */
.cat-legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
.cat-legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--ink-2)}
.cat-legend-dot{width:8px;height:8px;border-radius:50%}

/* ===== EMPTY STATE ===== */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:48px 24px;text-align:center;color:var(--mute);
}
.empty-emoji{font-size:48px;line-height:1;margin-bottom:14px;filter:grayscale(0.15)}
.empty-title{font-family:var(--font-display);font-style:italic;font-size:24px;color:var(--ink);margin-bottom:6px}
.empty-sub{font-size:13px;color:var(--mute);margin-bottom:20px;max-width:320px;line-height:1.5}

/* ===== SETTINGS ===== */
.settings-cat-card{background:var(--paper);border-radius:var(--r-lg);border:1px solid var(--hair);padding:20px;box-shadow:var(--shadow-soft);margin-bottom:14px}
.settings-cat-head{display:flex;align-items:center;gap:14px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--hair)}
.settings-photo-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.settings-photo-preview{width:64px;height:64px;border-radius:50%;background:var(--cream-2);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;border:1px solid var(--hair)}
.settings-photo-preview img{width:100%;height:100%;object-fit:cover}

/* ===== AVATAR PHOTO ===== */
.cat-av img,.cat-pill img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.cat-av{overflow:hidden}
.cat-pill{overflow:hidden}

/* restock btn */
.restock-btn{padding:4px 9px;border-radius:6px;font-size:11px;font-weight:600;background:var(--cream-2);color:var(--ink-2);border:1px solid var(--hair);cursor:pointer;flex-shrink:0;transition:all 0.15s}
.restock-btn:hover{background:var(--ink);color:var(--paper);border-color:var(--ink)}

/* toast */
#toast{
  position:fixed;left:50%;bottom:32px;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:var(--paper);padding:10px 18px;border-radius:var(--r-sm);
  font-size:13px;font-weight:600;box-shadow:var(--shadow-card);
  opacity:0;pointer-events:none;transition:opacity 0.2s,transform 0.2s;z-index:200;
  display:flex;align-items:center;gap:10px;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
#toast-action{background:transparent;border:1px solid rgba(255,255,255,0.4);color:var(--paper);
  padding:3px 10px;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
#toast-action:hover{background:rgba(255,255,255,0.15)}

/* recurring marker */
.cal-ev .repeat-mark{font-size:9px;opacity:0.7;margin-left:2px}

/* search row */
.search-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.search-row .form-input{flex:1;min-width:200px;padding:8px 12px;font-size:13px}

/* ===== PHOTO CROPPER ===== */
#crop-overlay{
  position:fixed;inset:0;background:rgba(20,18,16,0.92);z-index:1000;display:none;
  align-items:center;justify-content:center;flex-direction:column;padding:20px;
  -webkit-user-select:none;user-select:none;
}
#crop-overlay.open{display:flex}
.crop-frame{
  width:min(320px,80vw);height:min(320px,80vw);border-radius:50%;
  overflow:hidden;position:relative;background:#000;
  box-shadow:0 0 0 9999px rgba(0,0,0,0.55);
  touch-action:none;cursor:grab;
}
.crop-frame:active{cursor:grabbing}
.crop-frame img{
  position:absolute;left:0;top:0;transform-origin:0 0;

}
.crop-zoom-row{display:flex;align-items:center;gap:12px;margin-top:24px;width:min(320px,80vw)}
.crop-zoom-row input[type=range]{flex:1;accent-color:#fff}
.crop-zoom-row span{color:#fff;font-family:var(--font-mono);font-size:12px;min-width:40px;text-align:right}
.crop-actions{display:flex;gap:10px;margin-top:18px}

}
.crop-cancel{background:rgba(255,255,255,0.12);color:#fff}

<script>
// ===== CATS =====
const CATS = [
  { id:'macson',   name:'Macson',   breed:'Russian Blue', age:'6 yrs', weight:'4.8 kg', color:'#6B8AAE', soft:'#E4ECF4', deep:'#3F5874', tint:'#F1F5FA',  initial:'M', vibe:'Loaf-shaped diplomat',   photo:'/cats/macson.jpg' },
  { id:'miumiu',   name:'Miumiu',   breed:'Calico',       age:'4 yrs', weight:'3.6 kg', color:'#D87A6E', soft:'#F6E0DC', deep:'#8A3F36', tint:'#FAEFEC',  initial:'I', vibe:'Zoomie connoisseur',    photo:'/cats/miumiu.jpg' },
  { id:'duoduo',   name:'Duoduo',   breed:'Orange Tabby', age:'7 yrs', weight:'5.4 kg', color:'#D9A05A', soft:'#F4E5CC', deep:'#8C5A1F', tint:'#FBF3E2',  initial:'D', vibe:'Snack motivated',        photo:'/cats/duoduo.jpg' },
  { id:'llaollao', name:'Llaollao', breed:'Tuxedo',       age:'3 yrs', weight:'4.1 kg', color:'#8AA77B', soft:'#E1EAD9', deep:'#506849', tint:'#EEF3E9',  initial:'L', vibe:'Bird-watching scholar', photo:'/cats/llaollao.jpg' },
];
const catMap = {};
CATS.forEach(c => catMap[c.id] = c);

const CAT_TONE = { Food:'#E89A6E', Litter:'#9A8EB8', Treats:'#D87A6E', Supplements:'#B7B47A' };

// ===== STATE =====
let products = [];
let shopping = [];
let calendar = [];
let vet = { macson:[], miumiu:[], duoduo:[], llaollao:[] };
let meds = [];
let currency = 'RM';
let dark = false;
let currentView = 'home';

// ===== PERSISTENCE =====
function loadData() {
  try { products  = JSON.parse(localStorage.getItem('pantry_products') || '[]'); } catch(e){ products=[]; }
  try { shopping  = JSON.parse(localStorage.getItem('pantry_shopping') || '[]'); } catch(e){ shopping=[]; }
  try { calendar  = JSON.parse(localStorage.getItem('pantry_calendar') || '[]'); } catch(e){ calendar=[]; }
  try { vet       = JSON.parse(localStorage.getItem('pantry_vet') || 'null') || { macson:[], miumiu:[], duoduo:[], llaollao:[] }; } catch(e){ vet={ macson:[], miumiu:[], duoduo:[], llaollao:[] }; }
  try { meds      = JSON.parse(localStorage.getItem('pantry_meds') || '[]'); } catch(e){ meds=[]; }
  currency = localStorage.getItem('pantry_currency') || 'RM';
  dark = localStorage.getItem('pantry_dark') === 'true';
  // Merge saved cat profile edits onto hardcoded defaults (skip empty fields so defaults survive)
  try {
    const savedCats = JSON.parse(localStorage.getItem('pantry_cats') || 'null');
    if (savedCats && Array.isArray(savedCats)) {
      savedCats.forEach(saved => {
        const existing = CATS.find(c => c.id === saved.id);
        if (!existing) return;
        Object.keys(saved).forEach(k => {
          if (saved[k] !== '' && saved[k] != null) existing[k] = saved[k];
        });
      });
    }
  } catch(e) {}
  CATS.forEach(c => { catMap[c.id] = c; });
}
function saveData() {
  try {
    localStorage.setItem('pantry_products', JSON.stringify(products));
    localStorage.setItem('pantry_shopping', JSON.stringify(shopping));
    localStorage.setItem('pantry_calendar', JSON.stringify(calendar));
    localStorage.setItem('pantry_vet', JSON.stringify(vet));
    localStorage.setItem('pantry_meds', JSON.stringify(meds));
    localStorage.setItem('pantry_currency', currency);
    localStorage.setItem('pantry_dark', String(dark));
  } catch(e) {
    console.warn('saveData quota error', e);
  }
}
function saveCats() {
  // Strip photoOriginal (full-res source image) before writing — iPhone photos
  // can be 3-8 MB as base64, easily overflowing the 5 MB localStorage limit.
  // The cropped 512×512 photo is saved; photoOriginal lives only in memory.
  const toSave = CATS.map(c => {
    const { photoOriginal, ...rest } = c;
    return rest;
  });
  try {
    localStorage.setItem('pantry_cats', JSON.stringify(toSave));
  } catch(e) {
    showToast('Storage full — photo saved this session only. Remove a photo to free space.');
  }
}

// ===== HELPERS =====
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function calcPerUnit(amount, unit, price, cur) {
  const a = parseFloat(amount), p = parseFloat(price);
  if (!a || !p || isNaN(a) || isNaN(p)) return '—';
  if (unit === 'g') return `${cur}${(p/a*100).toFixed(2)} /100g`;
  if (unit === 'kg') return `${cur}${(p/a).toFixed(2)} /kg`;
  return '—';
}

function catAvatar(cat, size='md') {
  const inner = cat.photo ? `<img src="${cat.photo}" alt=""/>` : cat.initial;
  return `<div class="cat-av ${size}" style="background:${cat.color}">${inner}</div>`;
}

function showToast(msg, action) {
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id = 'toast'; document.body.appendChild(t); }
  t.innerHTML = `<span>${msg}</span>`;
  if (action) {
    const btn = document.createElement('button');
    btn.id = 'toast-action';
    btn.textContent = action.label;
    btn.onclick = () => { t.classList.remove('show'); action.fn(); };
    t.appendChild(btn);
  }
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => t.classList.remove('show'), 3000);
}

function hexToRgb(hex) {
  const h = hex.replace('#','');
  return { r: parseInt(h.slice(0,2),16), g: parseInt(h.slice(2,4),16), b: parseInt(h.slice(4,6),16) };
}
function rgbToHex(r,g,b) {
  const c = v => Math.max(0, Math.min(255, Math.round(v))).toString(16).padStart(2,'0');
  return '#' + c(r) + c(g) + c(b);
}
function deriveShades(hex) {
  const { r, g, b } = hexToRgb(hex);
  // soft = lighten 70%, tint = lighten 80%, deep = darken 45%
  const soft = rgbToHex(r + (255-r)*0.7, g + (255-g)*0.7, b + (255-b)*0.7);
  const tint = rgbToHex(r + (255-r)*0.82, g + (255-g)*0.82, b + (255-b)*0.82);
  const deep = rgbToHex(r*0.55, g*0.55, b*0.55);
  return { soft, tint, deep };
}

function quickRestock(productId) {
  const p = products.find(x => x.id === productId); if (!p) return;
  const already = shopping.find(s => !s.done && s.name === p.name);
  if (already) { showToast(`${p.name} is already on the list`); return; }
  shopping.push({
    id: uid(), name: p.name, size: p.packSize || '', for: [...(p.cats||[])],
    priority: 'soon', store: p.store || '', est: parseFloat(p.price) || '', done: false,
  });
  saveData(); render();
  showToast(`${p.name} added to shopping list`);
}

// ===== PHOTO CROPPER =====
// Lightweight circular cropper: drag to pan, slider/pinch to zoom, exports 512x512 JPEG.
const cropper = {
  overlay: null, frame: null, img: null, zoomEl: null, zoomVal: null,
  imgW: 0, imgH: 0, frameSize: 0,
  scale: 1, minScale: 1, maxScale: 4,
  tx: 0, ty: 0,
  dragging: false, lastX: 0, lastY: 0,
  pinchStart: 0, pinchScaleStart: 1,
  onSave: null,

  init() {
    this.overlay = document.getElementById('crop-overlay');
    this.frame = document.getElementById('crop-frame');
    this.img = document.getElementById('crop-img');
    this.zoomEl = document.getElementById('crop-zoom');
    this.zoomVal = document.getElementById('crop-zoom-val');

    document.getElementById('crop-cancel').onclick = () => this.close();
    document.getElementById('crop-save').onclick = () => this.save();

    this.zoomEl.oninput = () => {
      // zoom around frame centre
      const cx = this.frameSize / 2, cy = this.frameSize / 2;
      const newScale = this.minScale * parseFloat(this.zoomEl.value);
      this.zoomTo(newScale, cx, cy);
    };

    // pointer events (works for mouse + touch on modern browsers)
    this.frame.addEventListener('pointerdown', (e) => {
      this.frame.setPointerCapture(e.pointerId);
      this.dragging = true;
      this.lastX = e.clientX; this.lastY = e.clientY;
    });
    this.frame.addEventListener('pointermove', (e) => {
      if (!this.dragging) return;
      this.tx += e.clientX - this.lastX;
      this.ty += e.clientY - this.lastY;
      this.lastX = e.clientX; this.lastY = e.clientY;
      this.clamp(); this.apply();
    });
    const endDrag = (e) => {
      this.dragging = false;
      try { this.frame.releasePointerCapture(e.pointerId); } catch(_){}
    };
    this.frame.addEventListener('pointerup', endDrag);
    this.frame.addEventListener('pointercancel', endDrag);

    // pinch zoom on touch
    let touchStartDist = 0, touchStartScale = 1;
    this.frame.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        touchStartDist = Math.hypot(dx, dy);
        touchStartScale = this.scale;
      }
    });
    this.frame.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2) {
        e.preventDefault();
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.hypot(dx, dy);
        if (touchStartDist > 0) {
          const newScale = touchStartScale * (dist / touchStartDist);
          this.zoomTo(newScale, this.frameSize/2, this.frameSize/2);
          this.zoomEl.value = (this.scale / this.minScale).toFixed(2);
          this.zoomVal.textContent = (this.scale / this.minScale).toFixed(2) + '×';
        }
      }
    }, { passive: false });

    // wheel zoom on desktop
    this.frame.addEventListener('wheel', (e) => {
      e.preventDefault();
      const delta = -e.deltaY * 0.002;
      const newScale = this.scale * (1 + delta);
      const rect = this.frame.getBoundingClientRect();
      this.zoomTo(newScale, e.clientX - rect.left, e.clientY - rect.top);
      this.zoomEl.value = (this.scale / this.minScale).toFixed(2);
      this.zoomVal.textContent = (this.scale / this.minScale).toFixed(2) + '×';
    }, { passive: false });
  },

  open(dataUrl, onSave) {
    if (!this.overlay) this.init();
    this.onSave = onSave;
    const tempImg = new Image();
    tempImg.onload = () => {
      this.imgW = tempImg.naturalWidth;
      this.imgH = tempImg.naturalHeight;
      this.img.src = dataUrl;
      this.frameSize = this.frame.clientWidth;
      // initial scale: cover the frame
      this.minScale = Math.max(this.frameSize / this.imgW, this.frameSize / this.imgH);
      this.scale = this.minScale;
      // centre the image
      this.tx = (this.frameSize - this.imgW * this.scale) / 2;
      this.ty = (this.frameSize - this.imgH * this.scale) / 2;
      this.zoomEl.value = 1;
      this.zoomVal.textContent = '1.00×';
      this.apply();
      this.overlay.classList.add('open');
    };
    tempImg.src = dataUrl;
  },

  close() {
    this.overlay.classList.remove('open');
    this.img.src = '';
    this.onSave = null;
  },

  zoomTo(newScale, focalX, focalY) {
    newScale = Math.max(this.minScale, Math.min(this.maxScale * this.minScale, newScale));
    // keep focal point under cursor
    const ratio = newScale / this.scale;
    this.tx = focalX - (focalX - this.tx) * ratio;
    this.ty = focalY - (focalY - this.ty) * ratio;
    this.scale = newScale;
    this.clamp(); this.apply();
  },

  clamp() {
    // keep image covering frame
    const w = this.imgW * this.scale, h = this.imgH * this.scale;
    this.tx = Math.min(0, Math.max(this.frameSize - w, this.tx));
    this.ty = Math.min(0, Math.max(this.frameSize - h, this.ty));
  },

  apply() {
    this.img.style.width = this.imgW + 'px';
    this.img.style.height = this.imgH + 'px';
    this.img.style.transform = `translate(${this.tx}px, ${this.ty}px) scale(${this.scale})`;
  },

  save() {
    const out = 512;
    const canvas = document.createElement('canvas');
    canvas.width = out; canvas.height = out;
    const ctx = canvas.getContext('2d');
    // The visible 0..frameSize × 0..frameSize area of the transformed image is what we want.
    // Source rect on natural image: sx = -tx/scale, sy = -ty/scale, sw/sh = frameSize/scale
    const sx = -this.tx / this.scale;
    const sy = -this.ty / this.scale;
    const sw = this.frameSize / this.scale;
    const sh = this.frameSize / this.scale;
    ctx.drawImage(this.img, sx, sy, sw, sh, 0, 0, out, out);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
    const cb = this.onSave;
    this.close();
    if (cb) cb(dataUrl);
  },
};

function openCropper(dataUrl, cid, onSave) {
  const cat = catMap[cid];
  const title = document.getElementById('crop-title');
  if (title) title.textContent = cat ? `Crop ${cat.name}'s photo` : 'Crop photo';
  cropper.open(dataUrl, onSave);
}

function catPip(catId) {
  const c = catMap[catId]; if(!c) return '';
  return `<div class="cat-pip" style="background:${c.color}">${c.initial}</div>`;
}

function stockBadge(stock) {
  const n = parseInt(stock) || 0;
  if (n <= 0) return `<span class="stock-badge low">Out</span>`;
  if (n <= 1) return `<span class="stock-badge low">${n} left</span>`;
  return `<span class="stock-badge">${n}</span>`;
}

function productThumbnail(tone, label, cls='') {
  return `<div class="ph ${cls}" style="--tone:${tone||'#D9CFB6'}">${label||''}</div>`;
}

function shopPrioBadge(p) {
  if (p==='urgent') return `<span class="prio-badge prio-urgent">Urgent</span>`;
  if (p==='soon')   return `<span class="prio-badge prio-soon">Soon</span>`;
  return `<span class="prio-badge prio-watch">Watch</span>`;
}

function monthSpend() {
  const now = new Date();
  return calendar.filter(e => e.kind==='purchase' && new Date(e.date).getMonth()===now.getMonth() && new Date(e.date).getFullYear()===now.getFullYear())
    .reduce((sum,e) => sum + (parseFloat((e.detail||'').match(/[\d.]+/)?.[0])||0), 0);
}

function catSpend(catId) {
  // Sum purchase events in current month tagged to this cat
  const now = new Date();
  const fromCal = calendar
    .filter(e => e.kind === 'purchase' && e.catId === catId
      && new Date(e.date).getMonth() === now.getMonth()
      && new Date(e.date).getFullYear() === now.getFullYear())
    .reduce((s,e) => s + (parseFloat((e.detail||'').match(/[\d.]+/)?.[0]) || 0), 0);
  if (fromCal > 0) return fromCal;
  // Fallback to product price sum so empty calendar still shows something
  return products.filter(p => (p.cats||[]).includes(catId))
    .reduce((sum,p) => sum + (parseFloat(p.price)||0), 0);
}

function lowProducts() {
  return products.filter(p => (parseInt(p.stock)||0) <= 1);
}

function openItems() {
  return shopping.filter(s => !s.done);
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', {day:'numeric', month:'short', year:'numeric'});
}

function fmtMonthYear(d) {
  return d.toLocaleDateString('en-GB', {month:'long', year:'numeric'});
}

function fmtDay(d) {
  return d.toLocaleDateString('en-GB', {weekday:'long'});
}

function fmtShort(d) {
  return d.toLocaleDateString('en-GB', {day:'numeric', month:'short'});
}

function monthlySpends(months=6) {
  const now = new Date();
  const res = [];
  for (let i = months-1; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    const total = calendar.filter(e => e.kind==='purchase' && new Date(e.date).getMonth()===d.getMonth() && new Date(e.date).getFullYear()===d.getFullYear())
      .reduce((sum,e)=>sum+(parseFloat((e.detail||'').match(/[\d.]+/)?.[0])||0),0);
    res.push({ label: d.toLocaleDateString('en-GB',{month:'short'}), val: total });
  }
  return res;
}

// ===== RENDER ENGINE =====
function render() {
  document.getElementById('content-inner').innerHTML = views[currentView]();
  bindViewEvents();
}

function navigate(view) {
  currentView = view;
  document.querySelectorAll('.rail-item').forEach(el => el.classList.toggle('active', el.dataset.view===view));
  document.querySelectorAll('.mob-tab').forEach(el => el.classList.toggle('active', el.dataset.view===view));
  render();
}

    const pct = (sp/stackTotal*100).toFixed(1);

  }).join('');
  const catLegend = CATS.map(c=>`<div class="cat-legend-item"><div class="cat-legend-dot" style="background:${c.color}"></div>${c.name}</div>`).join('');

  // mini bar chart
  const barCols = months.map((m,i)=>{
    const h = Math.max(8, Math.round(m.val/maxM*100));
    const isLast = i===months.length-1;
    return `<div class="bar-col">
      <div class="bar-val" style="font-size:9px">${m.val>0?currency+Math.round(m.val):''}</div>
      <div class="bar-fill" style="height:${h}%;background:${isLast?'var(--ink)':'var(--hair-2)'}"></div>

  const lowHtml = low.slice(0,4).map(p=>{

    return `<div class="low-row">
      <div class="low-thumb ph" style="width:36px;height:36px;border-radius:8px;--tone:${tone};font-size:8px;align-items:flex-end;padding:3px 4px">${p.category||''}</div>

        <div class="low-sub">${p.brand||''}</div>

  }).join('');

  // recent calendar events
  const recent = [...calendar].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);
  const recentHtml = recent.map(e=>{
    const kindColors = {purchase:'#6E8B53',vet:'#C25A3A',refill:'#6B8AAE',other:'#8C8276'};
    const cat = e.catId ? catMap[e.catId] : null;
    return `<div class="timeline-row">
      <div class="timeline-dot" style="background:${kindColors[e.kind]||'#8C8276'}"></div>
      <div style="flex:1;min-width:0">
        <div class="timeline-title">${e.title}</div>
        <div class="timeline-sub">${fmtDate(e.date)}${cat?` · ${cat.name}`:''}</div>

    </div>`;
  }).join('') || `<div style="color:var(--mute);font-size:13px;padding:12px 0">No events yet.</div>`;

  // pantry preview
  const previewProds = products.slice(0,3).map(p=>{
    const tone = p.tone||CAT_TONE[p.category]||'#D9CFB6';
    const pu = calcPerUnit(p.packAmount,p.packUnit,p.price,currency);
    return `<div class="product-card" data-edit-product="${p.id}">
      ${productThumbnail(tone, p.category)}
      <div class="product-card-body">
        <div class="product-card-name">${p.name}</div>
        <div class="product-card-sub">${p.packSize||''} · ${pu}</div>

  return `

    <div class="page-kicker">${dayStr}, ${dateStr}</div>

    <div class="page-actions">
      <button class="btn btn-ghost" id="export-btn2">📊 Export</button>
      <button class="btn btn-primary" data-open-form="product,new">+ Log purchase</button>

  </div>

  <div class="cat-tiles">${catTilesHtml}</div>

  <div class="dash-grid">
    <div class="card span2">
      <div class="card-h">
        <h3>Shopping list</h3>
        <span class="badge badge-ink">${open.length}</span>
      </div>
      ${shopHtml || `<div style="color:var(--mute);font-size:13px;padding:8px 0">Nothing on the list.</div>`}
      <button class="add-stub" data-open-form="shopping,new">+ Add item</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:16px">
      <div class="card">
        <div class="card-h">
          <h3>Spend</h3>
          <span class="badge badge-mute">${now.toLocaleDateString('en-GB',{month:'short'})} · ${currency}${spend.toFixed(0)}</span>
        </div>
        <div class="bignum">${currency}${spend.toFixed(0)}</div>
        <div style="display:flex;align-items:flex-end;gap:4px;height:80px;margin-top:10px">${barCols}</div>

      <div class="product-grid-3">${previewProds}</div>

// ---- SHOPPING ----
views.shop = function() {
  const urgent = shopping.filter(s=>!s.done && s.priority==='urgent');
  const soon   = shopping.filter(s=>!s.done && s.priority==='soon');
  const watch  = shopping.filter(s=>!s.done && s.priority==='watch');
  const done   = shopping.filter(s=>s.done);
  const openTotal = shopping.filter(s=>!s.done).reduce((t,s)=>t+(parseFloat(s.est)||0),0);
  const openCount = shopping.filter(s=>!s.done).length;

  function renderGroup(items, label) {
    if (!items.length) return '';
    const rows = items.map(s => `
      <div class="shop-item${s.done?' done':''}">
        <div class="shop-cb${s.done?' checked':''}" data-toggle-shop="${s.id}"></div>
        <div style="flex:1;min-width:0">
          <div class="shop-name">${s.name}</div>
          <div class="shop-meta">
            ${s.size ? `<span>${s.size}</span>` : ''}
            ${s.store ? `<span>${s.store}</span>` : ''}
            ${(s.for||[]).map(catPip).join('')}
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="shop-price">${s.est?currency+parseFloat(s.est).toFixed(0):''}</div>
          <button class="btn btn-ghost" style="padding:4px 8px;font-size:11px" data-edit-shop="${s.id}">Edit</button>
        </div>
      </div>`).join('');
    return `<div class="card" style="margin-bottom:12px">
      <div class="card-h"><h3>${label}</h3><span class="badge badge-mute">${items.length}</span></div>
      ${rows}
    </div>`;
  }

  // by store
  const storeMap = {};
  shopping.filter(s=>!s.done).forEach(s=>{
    const st = s.store||'(no store)';
    if (!storeMap[st]) storeMap[st] = {items:[],est:0};
    storeMap[st].items.push(s);
    storeMap[st].est += parseFloat(s.est)||0;
  });
  const storeHtml = Object.entries(storeMap).map(([st,d])=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--hair)">
      <div>
        <div style="font-size:13px;font-weight:600">${st}</div>
        <div style="font-size:11px;color:var(--mute)">${d.items.length} item${d.items.length>1?'s':''}</div>
      </div>
      <div style="font-family:var(--font-mono);font-size:13px;font-weight:600">${currency}${d.est.toFixed(0)}</div>
    </div>`).join('') || `<div style="color:var(--mute);font-size:13px">No stores yet.</div>`;

  return `
  <div class="page-header">
    <div class="page-kicker">Shopping</div>
    <h1 class="page-title">What's on the list.</h1>
    <div class="page-sub">${openCount} open · est total ${currency}${openTotal.toFixed(0)}</div>
    <div class="page-actions">
      <button class="btn btn-primary" data-open-form="shopping,new">+ Add item</button>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 320px;gap:16px">
    <div>
      ${renderGroup(urgent,'Urgent') || (urgent.length===0 ? '' : '')}
      ${renderGroup(soon,'This week')}
      ${renderGroup(watch,'Watch list')}
      ${done.length ? `<div class="card">
        <div class="card-h"><h3>Done</h3><span class="badge badge-mute">${done.length}</span></div>
        ${done.map(s=>`<div class="shop-item done">
          <div class="shop-cb checked" data-toggle-shop="${s.id}"></div>
          <div style="flex:1"><div class="shop-name">${s.name}</div></div>
          <button class="btn btn-ghost" style="padding:4px 8px;font-size:11px" data-edit-shop="${s.id}">Edit</button>
        </div>`).join('')}
      </div>` : ''}
      ${!shopping.length ? `<div class="card"><div class="empty-state"><div class="empty-emoji">🛒</div><div class="empty-title">Nothing on the list</div><div class="empty-sub">Add items here when you're running low or planning your next pet store run.</div><button class="btn btn-primary" data-open-form="shopping,new">+ Add first item</button></div></div>` : ''}
      <button class="add-stub" data-open-form="shopping,new" style="margin-top:4px">+ Add item</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="card">
        <div class="card-h"><h3>By store</h3></div>
        ${storeHtml}
      </div>
      <div class="card" style="background:var(--llaollao-tint,#EEF3E9)">
        <div class="kpi-label">Estimated total</div>
        <div class="bignum">${currency}${openTotal.toFixed(0)}</div>
        <div class="kpi-delta">${openCount} items open</div>
      </div>
    </div>
  </div>`;
};

// ---- PANTRY ----
function filteredPantryProducts() {
  const pantryCatFilter = window._pantryCatFilter || 'All';
  const pantryForFilter = window._pantryForFilter || 'anyone';
  const search = (window._pantrySearch || '').trim().toLowerCase();
  const sort = window._pantrySort || 'updated';

  let list = products.filter(p => {
    const catOk = pantryCatFilter==='All' || p.category===pantryCatFilter;
    const forOk = pantryForFilter==='anyone' || (p.cats||[]).includes(pantryForFilter);
    const searchOk = !search || [p.name, p.brand, p.store].some(s => (s||'').toLowerCase().includes(search));
    return catOk && forOk && searchOk;
  });
  if (sort === 'name') list.sort((a,b) => (a.name||'').localeCompare(b.name||''));
  else if (sort === 'stock') list.sort((a,b) => (parseInt(a.stock)||0) - (parseInt(b.stock)||0));
  else if (sort === 'price-asc') list.sort((a,b) => (parseFloat(a.price)||0) - (parseFloat(b.price)||0));
  else if (sort === 'price-desc') list.sort((a,b) => (parseFloat(b.price)||0) - (parseFloat(a.price)||0));
  else list.sort((a,b) => new Date(b.updatedDate||0) - new Date(a.updatedDate||0));
  return list;
}

// ---- CALENDAR ----
views.cal = function() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const offset = (firstDay + 6) % 7; // Mon=0
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const daysInPrev = new Date(year, month, 0).getDate();
  const totalCells = Math.ceil((offset+daysInMonth)/7)*7;
  const today = now.getDate();

  const kindColors = {purchase:'#6E8B53',vet:'#C25A3A',refill:'#6B8AAE',other:'#8C8276'};
  const kindBg    = {purchase:'#D8E9CC',vet:'#F2D0C3',refill:'#D9E4F4',other:'#E8E3DC'};

  // Map events by day (expand recurring events as virtual occurrences in current month)
  const evByDay = {};
  const monthStart = new Date(year, month, 1);
  const monthEnd = new Date(year, month, daysInMonth);
  calendar.forEach(e => {
    const start = new Date(e.date);
    if (isNaN(start)) return;
    const occurrences = [];
    if (e.repeat === 'weekly') {
      let d = new Date(start);
      while (d <= monthEnd) {
        if (d >= monthStart && d.getMonth() === month && d.getFullYear() === year) occurrences.push(new Date(d));
        d.setDate(d.getDate() + 7);
      }
    } else if (e.repeat === 'monthly') {
      const day = start.getDate();
      const probe = new Date(year, month, day);
      if (probe >= start && probe.getMonth() === month) occurrences.push(probe);
    } else if (e.repeat === 'yearly') {
      const probe = new Date(year, start.getMonth(), start.getDate());
      if (probe >= start && probe.getMonth() === month && probe.getFullYear() === year) occurrences.push(probe);
    } else if (start.getFullYear() === year && start.getMonth() === month) {
      occurrences.push(start);
    }
    occurrences.forEach(d => {
      const dn = d.getDate();
      if (!evByDay[dn]) evByDay[dn] = [];
      evByDay[dn].push(e);
    });
  });

  let cells = '';
  for (let i=0; i<totalCells; i++) {
    const dayNum = i-offset+1;
    let dim=false, dispNum=dayNum, dateStr='';
    if (dayNum < 1) { dispNum=daysInPrev+dayNum; dim=true; }
    else if (dayNum > daysInMonth) { dispNum=dayNum-daysInMonth; dim=true; }
    else { dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`; }

    const isToday = !dim && dayNum===today;
    const evs = (!dim && evByDay[dayNum]) || [];
    const evHtml = evs.slice(0,2).map(e=>`<div class="cal-ev" style="background:${kindBg[e.kind]||'#E8E3DC'};color:${kindColors[e.kind]||'#8C8276'}">${e.title}${e.repeat && e.repeat!=='none' ? '<span class="repeat-mark">↻</span>' : ''}</div>`).join('');
    cells += `<div class="cal-cell${dim?' dim':''}${isToday?' today':''}" data-date="${dateStr}">
      <div class="cal-num">${dispNum}</div>
      ${evHtml}
    </div>`;
  }

  const upcoming = [...calendar]
    .filter(e=>new Date(e.date)>=new Date(year,month,today))
    .sort((a,b)=>new Date(a.date)-new Date(b.date))
    .slice(0,8);

  const upHtml = upcoming.map(e=>{
    const cat = e.catId?catMap[e.catId]:null;
    return `<div class="timeline-row">
      <div class="timeline-dot" style="background:${kindColors[e.kind]||'#8C8276'}"></div>
      <div style="flex:1;min-width:0">
        <div class="timeline-title">${e.title}</div>
        <div class="timeline-sub">${fmtDate(e.date)}${cat?` · ${cat.name}`:''} · <span style="text-transform:capitalize">${e.kind}</span></div>
      </div>
      <button class="btn btn-ghost" style="padding:4px 8px;font-size:11px" data-edit-event="${e.id}">Edit</button>
    </div>`;
  }).join('') || `<div style="color:var(--mute);font-size:13px;padding:12px 0">No upcoming events.</div>`;

  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const dayHeaders = days.map(d=>`<div class="cal-header-cell">${d}</div>`).join('');

  return `
  <div class="page-header">
    <div class="page-kicker">${fmtMonthYear(now)}</div>
    <h1 class="page-title">A month of <em>tiny obligations.</em></h1>
    <div class="page-actions">
      <button class="btn btn-primary" data-open-form="event,new">+ New event</button>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 340px;gap:16px">
    <div class="card">
      <div class="cal-grid">${dayHeaders}${cells}</div>
    </div>
    <div class="card">
      <div class="card-h"><h3>Upcoming</h3></div>
      ${upHtml}
      <button class="add-stub" data-open-form="event,new" style="margin-top:8px">+ New event</button>
    </div>
  </div>`;
};

// ---- SPEND ----
views.spend = function() {
  const now = new Date();
  const spend = monthSpend();
  const total = CATS.reduce((s,c)=>s+catSpend(c.id),0);
  const perCat = total/CATS.length;
  const yrTotal = (() => {
    const yr=now.getFullYear();
    return calendar.filter(e=>e.kind==='purchase'&&new Date(e.date).getFullYear()===yr)
      .reduce((s,e)=>s+(parseFloat((e.detail||'').match(/[\d.]+/)?.[0])||0),0);
  })();
  const months = monthlySpends(6);
  const maxM = Math.max(...months.map(m=>m.val),1);

  const barCols = months.map((m,i)=>{
    const h = Math.max(8, Math.round(m.val/maxM*100));
    const isLast = i===months.length-1;
    return `<div class="bar-col">
      <div class="bar-val">${m.val>0?currency+Math.round(m.val):''}</div>
      <div class="bar-fill" style="height:${h}%;background:${isLast?'var(--ink)':'var(--hair-2)'}"></div>
      <div class="bar-label">${m.label}</div>
    </div>`;
  }).join('');

  // by category
  const catTotals = {};
  products.forEach(p=>{
    const cat = p.category||'Other';
    catTotals[cat] = (catTotals[cat]||0) + (parseFloat(p.price)||0);
  });
  const catMax = Math.max(...Object.values(catTotals),1);
  const catRows = Object.entries(catTotals).map(([cat,val])=>`
    <div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:13px;font-weight:600">${cat}</span>
        <span style="font-family:var(--font-mono);font-size:13px">${currency}${val.toFixed(0)}</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" style="width:${(val/catMax*100).toFixed(1)}%;background:${CAT_TONE[cat]||'var(--hair-2)'}"></div></div>
    </div>`).join('') || `<div style="color:var(--mute);font-size:13px">No spending data.</div>`;

  const catSpendCards = CATS.map(c=>{
    const sp = catSpend(c.id);
    return `<div class="cat-spend-tile">
      ${catAvatar(c,'md')}
      <div style="font-family:var(--font-display);font-style:italic;font-size:15px;margin-top:6px;color:${c.deep}">${c.name}</div>
      <div class="cat-spend-amt" style="color:${c.deep}">${currency}${sp.toFixed(0)}</div>
    </div>`;
  }).join('');

  return `
  <div class="page-header">
    <div class="page-kicker">${fmtMonthYear(now)}</div>
    <h1 class="page-title">Where the money <em>actually</em> goes.</h1>
  </div>
  <div class="kpi-row">
    <div class="kpi-card">
      <div class="kpi-label">This month</div>
      <div class="bignum-sm">${currency}${spend.toFixed(0)}</div>
      <div class="kpi-delta">from purchase events</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Per cat (products)</div>
      <div class="bignum-sm">${currency}${perCat.toFixed(0)}</div>
      <div class="kpi-delta">avg across 4 cats</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Year to date</div>
      <div class="bignum-sm">${currency}${yrTotal.toFixed(0)}</div>
      <div class="kpi-delta">${now.getFullYear()}</div>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-bottom:16px">
    <div class="card">
      <div class="card-h"><h3>Six months</h3></div>
      <div class="bar-chart">${barCols}</div>
    </div>
    <div class="card">
      <div class="card-h"><h3>By category</h3></div>
      ${catRows}
    </div>
  </div>
  <div class="card">
    <div class="card-h"><h3>By cat</h3></div>
    <div class="cat-spend-grid">${catSpendCards}</div>
  </div>`;
};

  const activeMeds = meds.filter(m => m.active);
  const inactiveMeds = meds.filter(m => !m.active);
  const totalActive = activeMeds.length;

  const now = new Date();
  const upcoming = activeMeds
    .filter(m => m.refillDate && new Date(m.refillDate) >= now)
    .sort((a,b) => new Date(a.refillDate) - new Date(b.refillDate));
  const nextRefill = upcoming[0];
  const nextRefillDays = nextRefill ? Math.ceil((new Date(nextRefill.refillDate) - now) / 86400000) : null;

  const catSections = CATS.map(cat => {
    const catActive = activeMeds.filter(m => m.catId === cat.id);
    if (!catActive.length) return null;
    const rows = catActive.map(m => {
      const daysOn = m.startDate ? Math.floor((Date.now() - new Date(m.startDate)) / 86400000) : 0;
      const lowStock = m.stock !== '' && m.stock !== undefined && m.stock !== null && parseInt(m.stock) <= 5;
      return `<div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--hair)">

        </div>
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:600;margin-bottom:2px">${escHtml(m.name)}</div>
          <div style="font-size:11px;color:var(--mute)">${m.dosage}${m.unit} · ${FREQ_LABEL[m.freq]||m.freq}${m.prescribedBy ? ' · '+escHtml(m.prescribedBy) : ''}</div>
          ${m.note ? `<div style="font-size:11px;color:var(--mute);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px">${escHtml(m.note)}</div>` : ''}

        <div style="text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:4px">

        </div>

      </div>`;
    }).join('');
    return `<div class="card" style="margin-bottom:12px">
      <div class="card-h">
        <div style="display:flex;align-items:center;gap:8px">${catAvatar(cat,'sm')}<h3>${cat.name}</h3></div>
        <span class="badge badge-mute">${catActive.length} active</span>
      </div>
      ${rows}

    </div>`;

      <button class="btn btn-primary" data-open-form="medicine,new">+ Log medicine</button>

};

// ===== CAT DRAWER =====
function openCatDrawer(catId) {
  const cat = catMap[catId]; if(!cat) return;
  const catProds = products.filter(p=>(p.cats||[]).includes(catId));
  const catShop  = shopping.filter(s=>(s.for||[]).includes(catId)&&!s.done);
  const catVet   = (vet[catId]||[]).slice().sort((a,b)=>new Date(b.date)-new Date(a.date));
  const sp = catSpend(catId);
  const nextVet = catVet[0] ? fmtDate(catVet[0].date) : 'None logged';

  const prodRows = catProds.map(p=>{
    const tone = p.tone||CAT_TONE[p.category]||'#D9CFB6';
    const pu = calcPerUnit(p.packAmount,p.packUnit,p.price,currency);
    return `<div class="drawer-prod">
      <div class="drawer-prod-thumb ph" style="--tone:${tone};font-size:8px;align-items:flex-end;padding:2px 4px">${p.category||''}</div>
      <div style="flex:1;min-width:0">
        <div class="drawer-prod-name">${p.name}</div>
        <div class="drawer-prod-sub">${p.brand||''} · ${pu}</div>
      </div>
      ${stockBadge(p.stock)}
      <button class="restock-btn" data-restock="${p.id}">Restock</button>
    </div>`;
  }).join('') || `<div style="color:var(--mute);font-size:13px">No products assigned.</div>`;

  const shopRows = catShop.map(s=>`
    <div class="drawer-prod">
      <div style="flex:1"><div class="drawer-prod-name">${s.name}</div><div class="drawer-prod-sub">${s.size||''} · ${s.store||''}</div></div>
      <div style="font-family:var(--font-mono);font-size:12px">${s.est?currency+parseFloat(s.est).toFixed(0):''}</div>
    </div>`).join('');

  const vetRows = catVet.slice(0,5).map(n=>`
    <div class="vet-note">
      <div class="vet-note-date">${fmtDate(n.date)}</div>
      <div class="vet-note-title">${n.title}</div>
      <div class="vet-note-body">${n.body||''}</div>
      ${n.vet?`<div class="vet-note-vet">${n.vet}</div>`:''}
    </div>`).join('');

  const el = document.getElementById('cat-drawer');
  el.innerHTML = `
    <button class="drawer-close" id="cat-drawer-close">✕</button>
    <div class="drawer-hero" style="background:linear-gradient(160deg,${cat.color},${cat.deep})">
      <div class="vibe-tag">${cat.vibe}</div>
      <div class="drawer-name">${cat.name}</div>
      <div class="drawer-breed">${cat.breed}</div>
      <div class="drawer-stats">
        <div class="drawer-stat"><div class="drawer-stat-label">This month</div><div class="drawer-stat-val">${currency}${sp.toFixed(0)}</div></div>
        <div class="drawer-stat"><div class="drawer-stat-label">Products</div><div class="drawer-stat-val">${catProds.length}</div></div>
        <div class="drawer-stat"><div class="drawer-stat-label">Favorites</div><div class="drawer-stat-val">${catProds.filter(p=>p.rating==='love').length}</div></div>
        <div class="drawer-stat"><div class="drawer-stat-label">Last vet</div><div class="drawer-stat-val">${nextVet}</div></div>
      </div>
    </div>
    <div class="drawer-body">
      <div class="drawer-section">
        <div class="drawer-section-title">Pantry</div>
        ${prodRows}
      </div>
      ${catShop.length ? `<div class="drawer-section"><div class="drawer-section-title">Shopping</div>${shopRows}</div>` : ''}
      <div class="drawer-section">
        <div class="drawer-section-title">Vet notes</div>
        ${vetRows || `<div style="color:var(--mute);font-size:13px">No visits logged.</div>`}
        <button class="add-stub" data-open-form="vet,${catId}" style="margin-top:8px">+ Add visit</button>
      </div>
    </div>`;
  openDrawer('cat-drawer');
  document.getElementById('cat-drawer-close').onclick = () => closeDrawers();
  // wire restock buttons inside the drawer (bindViewEvents only scans content-inner)
  el.querySelectorAll('[data-restock]').forEach(b => b.onclick = (e) => {
    e.stopPropagation();
    quickRestock(b.dataset.restock);
  });
}

// ===== FORM DRAWER =====
function openForm(type, arg) {
  const el = document.getElementById('form-drawer');

  if (type==='product') {
    const isNew = arg==='new';
    const prod = isNew ? { id:uid(), category:'Food', name:'', brand:'', packAmount:'', packUnit:'g', price:'', store:'', stock:'', rating:'', cats:[], note:'', tone:'', updatedDate:new Date().toISOString() } : products.find(p=>p.id===arg);
    if (!prod) return;

    const catSeg = ['Food','Litter','Treats','Supplements'].map(c=>`<button class="seg-btn${prod.category===c?' active':''}" data-prod-cat="${c}">${c}</button>`).join('');
    const catToggles = CATS.map(c=>`<button class="cat-toggle${(prod.cats||[]).includes(c.id)?' active':''}" style="${(prod.cats||[]).includes(c.id)?'background:'+c.color+';border-color:'+c.color+';color:#fff':''}" data-cat-tog="${c.id}">${catPip(c.id)} ${c.name}</button>`).join('');
    const pu = calcPerUnit(prod.packAmount,prod.packUnit,prod.price,currency);
    const ratingBtns = [['love','😻'],['ok','😐'],['meh','😾']].map(([r,e])=>`<button class="rating-btn${prod.rating===r?' active':''}" data-rating="${r}">${e}</button>`).join('');

    el.innerHTML = `
      <div class="form-header">
        <div class="form-title">${isNew?'New product':'Edit product'}</div>
        <button class="form-close" id="form-close">✕</button>
      </div>
      <div class="form-body">
        <div class="form-group">
          <label class="form-label">Category</label>
          <div class="seg" id="prod-cat-seg">${catSeg}</div>
        </div>
        <div class="form-group">
          <label class="form-label">Name</label>
          <input class="form-input form-input-lg" id="f-name" value="${escHtml(prod.name)}" placeholder="Product name" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Brand</label>
          <input class="form-input" id="f-brand" value="${escHtml(prod.brand||'')}" placeholder="Brand (optional)"/>
        </div>
        <div class="form-group">
          <label class="form-label">Pack size</label>
          <div style="display:flex;gap:8px">
            <input class="form-input" id="f-amount" type="number" min="0" style="flex:1" value="${prod.packAmount||''}" placeholder="e.g. 85"/>
            <div class="seg" id="unit-seg">
              <button class="seg-btn${prod.packUnit==='g'?' active':''}" data-unit="g">g</button>
              <button class="seg-btn${prod.packUnit==='kg'?' active':''}" data-unit="kg">kg</button>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Total price</label>
          <input class="form-input" id="f-price" type="number" min="0" step="0.01" value="${prod.price||''}" placeholder="0.00"/>
          <div class="per-unit-display" id="per-unit-disp">${pu}</div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Store</label>
            <input class="form-input" id="f-store" value="${escHtml(prod.store||'')}" placeholder="Store name"/>
          </div>
          <div class="form-group">
            <label class="form-label">Stock count</label>
            <input class="form-input" id="f-stock" type="number" min="0" value="${prod.stock||''}" placeholder="0"/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Rating</label>
          <div class="rating-btns" id="rating-btns">${ratingBtns}</div>
        </div>
        <div class="form-group">
          <label class="form-label">For cats</label>
          <div class="cat-toggle-row" id="cat-toggles">${catToggles}</div>
        </div>
        <div class="form-group">
          <label class="form-label">Note</label>
          <textarea class="form-input" id="f-note" rows="3" placeholder="Any notes...">${escHtml(prod.note||'')}</textarea>
        </div>
      </div>
      <div class="form-footer">
        ${!isNew ? `<button class="btn btn-warn" id="f-delete">Delete</button>` : ''}
        <button class="btn btn-ghost" id="form-cancel">Cancel</button>
        <button class="btn btn-primary" id="f-save">Save product</button>
      </div>`;

    // State for form
    let fState = { ...prod, cats: [...(prod.cats||[])] };

    // Category seg
    el.querySelectorAll('[data-prod-cat]').forEach(btn => btn.onclick = () => {
      fState.category = btn.dataset.prodCat;
      el.querySelectorAll('[data-prod-cat]').forEach(b=>b.classList.toggle('active',b.dataset.prodCat===fState.category));
    });

    // Unit seg
    el.querySelectorAll('[data-unit]').forEach(btn => btn.onclick = () => {
      fState.packUnit = btn.dataset.unit;
      el.querySelectorAll('[data-unit]').forEach(b=>b.classList.toggle('active',b.dataset.unit===fState.packUnit));
      updatePerUnit();
    });

    function updatePerUnit() {
      const amt = document.getElementById('f-amount')?.value;
      const price = document.getElementById('f-price')?.value;
      const pu2 = calcPerUnit(amt, fState.packUnit, price, currency);
      const d = document.getElementById('per-unit-disp');
      if(d) d.textContent = pu2;
    }
    el.querySelector('#f-amount')?.addEventListener('input', updatePerUnit);
    el.querySelector('#f-price')?.addEventListener('input', updatePerUnit);

    // Rating
    el.querySelectorAll('[data-rating]').forEach(btn => btn.onclick = () => {
      fState.rating = fState.rating===btn.dataset.rating ? '' : btn.dataset.rating;
      el.querySelectorAll('[data-rating]').forEach(b=>b.classList.toggle('active',b.dataset.rating===fState.rating));
    });

    // Cat toggles
    el.querySelectorAll('[data-cat-tog]').forEach(btn => btn.onclick = () => {
      const cid = btn.dataset.catTog;
      const cat = catMap[cid];
      if (fState.cats.includes(cid)) {
        fState.cats = fState.cats.filter(x=>x!==cid);
        btn.classList.remove('active');
        btn.style.background=''; btn.style.borderColor=''; btn.style.color='';
      } else {
        fState.cats.push(cid);
        btn.classList.add('active');
        btn.style.background=cat.color; btn.style.borderColor=cat.color; btn.style.color='#fff';
      }
    });

    // Save
    el.querySelector('#f-save').onclick = () => {
      const name = document.getElementById('f-name').value.trim();
      if (!name) { document.getElementById('f-name').focus(); return; }
      const amt = document.getElementById('f-amount').value;
      const price = document.getElementById('f-price').value;
      const obj = {
        ...fState,
        name,
        brand: document.getElementById('f-brand').value.trim(),
        packAmount: parseFloat(amt)||0,
        packUnit: fState.packUnit,
        packSize: `${amt||''} ${fState.packUnit}`.trim(),
        price: parseFloat(price)||0,
        perUnit: calcPerUnit(amt, fState.packUnit, price, currency),
        store: document.getElementById('f-store').value.trim(),
        stock: parseInt(document.getElementById('f-stock').value)||0,
        note: document.getElementById('f-note').value.trim(),
        tone: CAT_TONE[fState.category]||'#D9CFB6',
        updatedDate: new Date().toISOString(),
      };
      if (isNew) {
        products.push(obj);
        // Auto-log a purchase calendar event so spend tracking works
        if (obj.price > 0) {
          calendar.push({
            id: uid(),
            date: new Date().toISOString().split('T')[0],
            kind: 'purchase',
            catId: obj.cats[0] || null,
            title: obj.name,
            detail: `${obj.store || 'Purchase'} · ${currency}${obj.price.toFixed(2)}`,
          });
        }
      }
      else { const idx=products.findIndex(p=>p.id===arg); if(idx>=0) products[idx]=obj; }
      saveData(); closeDrawers(); render();
    };

    // Delete
    if (!isNew) {
      el.querySelector('#f-delete').onclick = () => {
        if (confirm(`Delete "${prod.name}"?`)) {
          products = products.filter(p=>p.id!==arg);
          saveData(); closeDrawers(); render();
        }
      };
    }
  }

  else if (type==='shopping') {
    const isNew = arg==='new';
    const item = isNew ? { id:uid(), name:'', size:'', store:'', est:'', priority:'soon', for:[], done:false } : shopping.find(s=>s.id===arg);
    if (!item) return;

    const catToggles = CATS.map(c=>`<button class="cat-toggle${(item.for||[]).includes(c.id)?' active':''}" style="${(item.for||[]).includes(c.id)?'background:'+c.color+';border-color:'+c.color+';color:#fff':''}" data-cat-tog="${c.id}">${catPip(c.id)} ${c.name}</button>`).join('');
    const prioSeg = ['urgent','soon','watch'].map(p=>`<button class="seg-btn${item.priority===p?' active':''}" data-prio="${p}" style="text-transform:capitalize">${p}</button>`).join('');

    el.innerHTML = `
      <div class="form-header">
        <div class="form-title">${isNew?'Add item':'Edit item'}</div>
        <button class="form-close" id="form-close">✕</button>
      </div>
      <div class="form-body">
        <div class="form-group">
          <label class="form-label">Name</label>
          <input class="form-input form-input-lg" id="sf-name" value="${escHtml(item.name)}" placeholder="Item name" required/>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Size / Variant</label>
            <input class="form-input" id="sf-size" value="${escHtml(item.size||'')}" placeholder="e.g. 85g × 24"/>
          </div>
          <div class="form-group">
            <label class="form-label">Store</label>
            <input class="form-input" id="sf-store" value="${escHtml(item.store||'')}" placeholder="Store name"/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Estimated price</label>
          <input class="form-input" id="sf-est" type="number" min="0" step="0.01" value="${item.est||''}" placeholder="0.00"/>
        </div>
        <div class="form-group">
          <label class="form-label">Priority</label>
          <div class="seg" id="prio-seg">${prioSeg}</div>
        </div>
        <div class="form-group">
          <label class="form-label">For cats</label>
          <div class="cat-toggle-row">${catToggles}</div>
        </div>
      </div>
      <div class="form-footer">
        ${!isNew ? `<button class="btn btn-warn" id="sf-delete">Delete</button>` : ''}
        <button class="btn btn-ghost" id="form-cancel">Cancel</button>
        <button class="btn btn-primary" id="sf-save">Save item</button>
      </div>`;

    let fState = { ...item, for: [...(item.for||[])], priority: item.priority||'soon' };

    el.querySelectorAll('[data-prio]').forEach(btn => btn.onclick = () => {
      fState.priority = btn.dataset.prio;
      el.querySelectorAll('[data-prio]').forEach(b=>b.classList.toggle('active',b.dataset.prio===fState.priority));
    });

    el.querySelectorAll('[data-cat-tog]').forEach(btn => btn.onclick = () => {
      const cid = btn.dataset.catTog;
      const cat = catMap[cid];
      if (fState.for.includes(cid)) {
        fState.for = fState.for.filter(x=>x!==cid);
        btn.classList.remove('active');
        btn.style.background=''; btn.style.borderColor=''; btn.style.color='';
      } else {
        fState.for.push(cid);
        btn.classList.add('active');
        btn.style.background=cat.color; btn.style.borderColor=cat.color; btn.style.color='#fff';
      }
    });

    el.querySelector('#sf-save').onclick = () => {
      const name = document.getElementById('sf-name').value.trim();
      if (!name) { document.getElementById('sf-name').focus(); return; }
      const obj = { ...fState, name, size: document.getElementById('sf-size').value.trim(), store: document.getElementById('sf-store').value.trim(), est: parseFloat(document.getElementById('sf-est').value)||'' };
      if (isNew) { shopping.push(obj); }
      else { const idx=shopping.findIndex(s=>s.id===arg); if(idx>=0) shopping[idx]=obj; }
      saveData(); closeDrawers(); render();
    };

    if (!isNew) {
      el.querySelector('#sf-delete').onclick = () => {
        if (confirm(`Remove "${item.name}"?`)) {
          shopping = shopping.filter(s=>s.id!==arg);
          saveData(); closeDrawers(); render();
        }
      };
    }
  }

  else if (type==='vet') {
    const catId = arg;
    const cat = catMap[catId];
    const catSel = CATS.map(c=>`<option value="${c.id}"${c.id===catId?' selected':''}>${c.name}</option>`).join('');
